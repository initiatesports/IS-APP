<title>INITIATE SPORTS · 教練點名</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Noto+Sans+HK:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#11161C; --ink2:#3D4753; --muted:#6B7686; --line:#E6E8EC;
  --bg:#F2F5F6; --card:#FFFFFF; --accent:#1BAFBD; --accent-ink:#0B6C76;
  --ok:#0F9D6B; --ok-bg:#E4F6EE; --bad:#D6432F; --bad-bg:#FCE6E2;
  --makeup:#1F6FEB; --makeup-bg:#E3EEFD; --r:14px;
  --badminton:#B45309; --basketball:#1E40AF; --gym:#6D28D9;
  --athletics:#B91C1C; --rope:#15803D; --pickleball:#BE185D;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Noto Sans HK",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.6}
.app{max-width:520px;margin:0 auto;min-height:100vh}
h1,h2,h3,.bt{font-family:"Bricolage Grotesque",sans-serif;letter-spacing:-.01em}
button{font-family:inherit;cursor:pointer;border:none}
.topbar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);
  padding:10px 14px;display:flex;align-items:center;gap:11px;padding-top:calc(10px + env(safe-area-inset-top))}
.topbar .logo{height:34px;flex:none}
.topbar .bt{font-weight:700;font-size:15px;line-height:1.1}
.topbar .bt span{color:var(--accent)}
.topbar .sub{font-size:11px;color:var(--muted)}
.topbar .right{margin-left:auto}
.chip-btn{background:#EEF1F3;color:var(--ink2);border-radius:99px;padding:6px 12px;font-size:13px;font-weight:500}
.wrap{padding:16px 14px 40px}
input{width:100%;padding:14px;font-size:16px;font-family:inherit;border:1.5px solid var(--line);border-radius:var(--r);background:#fff;outline:none}
input:focus{border-color:var(--accent)}
.btn{display:block;width:100%;background:var(--accent);color:#fff;font-weight:700;font-size:16px;padding:15px;border-radius:var(--r);text-align:center}
.btn:active{transform:scale(.99)}
.gate{padding:40px 22px;min-height:72vh;display:flex;flex-direction:column;justify-content:center}
.gate img{width:200px;max-width:60%;display:block;margin:0 auto 24px}
.gate h2{text-align:center;font-size:22px;margin:0 0 4px}
.gate p{text-align:center;color:var(--muted);margin:0 0 22px}
.codein{letter-spacing:.3em;text-align:center;font-size:18px;font-weight:700}
.coach-bar{display:flex;gap:9px;align-items:center;margin-bottom:8px}
.coach-bar input[type=date]{flex:1}
.mini{padding:13px 14px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-weight:600;color:var(--accent-ink);white-space:nowrap}
.daysum{font-size:13px;color:var(--muted);margin:2px 2px 14px}
.grp{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:14px}
.grp-h{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.dot{width:11px;height:11px;border-radius:99px;flex:none}
.grp-h .nm{font-weight:700;font-size:16px}
.grp-h .ct{margin-left:auto;font-size:13px;font-weight:700;color:var(--ok)}
.grp .time{font-size:12.5px;color:var(--muted);margin:-2px 0 8px 20px}
.allbtn{font-size:12.5px;font-weight:600;color:var(--accent-ink);background:#E9F8F9;border-radius:99px;padding:6px 12px;margin:2px 0 10px}
.att{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
.att:first-of-type{border-top:none}
.att .nm{font-weight:500}
.att .tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:99px;background:var(--makeup-bg);color:var(--makeup)}
.marks{margin-left:auto;display:flex;gap:7px}
.mk{min-width:46px;height:38px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-size:14px;font-weight:700;color:var(--muted)}
.mk.go.on{background:var(--ok);color:#fff;border-color:var(--ok)}
.mk.no.on{background:var(--bad);color:#fff;border-color:var(--bad)}
.empty{text-align:center;color:var(--muted);padding:46px 12px;font-size:14px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:99px;font-size:14px;z-index:80;opacity:0;transition:.25s;max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%)}
.foot{text-align:center;color:#A6AEB9;font-size:11.5px;padding:18px}
.banner-demo{background:#FFF3CD;color:#7a5b00;font-size:12px;text-align:center;padding:6px}
</style>
</head>

const CONFIG = {
  API_URL: "https://script.google.com/macros/s/AKfycby9Ln3kZUubqRIuGdCF5cJ5tk4KuPITMQDuOFFuee1OwrId5gUa_sP_W5CuHga9y6i8/exec",
  COACH_PASS: "IS2026",
};
const WDN=["日","一","二","三","四","五","六"];
const SPORT={badminton:{name:"羽毛球",color:"var(--badminton)"},basketball:{name:"籃球",color:"var(--basketball)"},
  gym:{name:"體操",color:"var(--gym)"},athletics:{name:"田徑",color:"var(--athletics)"},
  rope:{name:"花式跳繩",color:"var(--rope)"},pickleball:{name:"匹克球",color:"var(--pickleball)"}};
const isDemo=!CONFIG.API_URL;
const $=s=>document.querySelector(s);
const view=$("#view");
function toast(t){const e=$("#toast");e.textContent=t;e.classList.add("show");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("show"),2000);}
const todayIso=()=>new Date().toLocaleDateString("en-CA");
let S={authed:false,date:isDemo?"2026-07-16":todayIso()};

/* ---- API ---- */
async function api(action,p={}){
  if(isDemo) return new Promise(r=>setTimeout(()=>r(demo(action,p)),150));
  const res=await fetch(CONFIG.API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
    body:JSON.stringify({action,...p})});
  return res.json();
}
/* ---- demo ---- */
const DEMO_DAY={ "2026-07-16":[
  {c:{sport:"badminton",wd:"四",time:"10:00–12:00"},rows:[{name:"陳大文"},{name:"王小強"},{name:"李曉晴",makeup:true}]},
  {c:{sport:"rope",wd:"四",time:"14:00–15:00"},rows:[{name:"林大明"},{name:"黃小花"},{name:"周小傑"}]},
]};
function demoLog(){try{return JSON.parse(localStorage.getItem("coach_demo")||"[]")}catch(e){return[]}}
function demoSave(l){try{localStorage.setItem("coach_demo",JSON.stringify(l))}catch(e){}}
function demo(action,p){
  if(action==="dailyList"){
    const base=JSON.parse(JSON.stringify(DEMO_DAY[p.date]||[]));
    const log=demoLog();
    base.forEach(g=>g.rows.forEach(r=>{const k=g.c.sport+"|"+g.c.wd;
      const a=log.filter(l=>l.name===r.name&&l.key===k&&l.date===p.date); r.status=a.length?a[a.length-1].status:"";}));
    return {ok:true,list:base};
  }
  if(action==="markAttendance"){let l=demoLog();
    l=l.filter(x=>!(x.name===p.name&&x.key===p.key&&x.date===p.date));
    l.push({name:p.name,key:p.key,date:p.date,status:p.status}); demoSave(l); return {ok:true};}
  return {ok:false};
}

function enter(){ if($("#cp").value!==CONFIG.COACH_PASS) return toast("密碼錯誤");
  S.authed=true; renderMain(); }
function logout(){ S.authed=false; renderGate(); }

/* ---- main roll call ---- */
function renderMain(){
  $("#navRight").innerHTML=`<button class="chip-btn" onclick="logout()">登出</button>`;
  view.innerHTML=`<div class="wrap">
    <div style="font-family:'Bricolage Grotesque';font-weight:700;font-size:22px;margin:2px 2px 12px">每日點名</div>
    <div class="coach-bar">
      <input type="date" id="d" value="${S.date}">
      <button class="mini" onclick="setToday()">今日</button>
      <button class="mini" onclick="load()">↻</button>
    </div>
    <div class="daysum" id="sum"></div>
    <div id="list"></div></div>`;
  $("#d").addEventListener("change",e=>{S.date=e.target.value;load();});
  load();
}
function setToday(){S.date=todayIso();$("#d").value=S.date;load();}
async function load(){
  const date=S.date, d=new Date(date+"T00:00:00");
  $("#sum").textContent=`${date}（星期${WDN[d.getDay()]}）`;
  const box=$("#list"); box.innerHTML=`<div class="empty">載入中…</div>`;
  try{
    const r=await api("dailyList",{date,coachPass:CONFIG.COACH_PASS});
    if(!r||!r.ok){box.innerHTML=`<div class="empty">載入失敗${r&&r.err?'：'+r.err:''}</div>`;return;}
    if(!r.list.length){box.innerHTML=`<div class="empty">呢日冇堂（暑期班 7 月 13 日先開始）。<br>請揀返星期一～五嘅上課日，例如 7/16。</div>`;return;}
    box.innerHTML=r.list.map((g,gi)=>grp(g,gi,date)).join("");
  }catch(e){ box.innerHTML=`<div class="empty">連線錯誤：${(e&&e.message)||e}</div>`; }
}
function grp(g,gi,date){
  const sp=SPORT[g.c.sport], key=g.c.sport+"|"+g.c.wd;
  const present=g.rows.filter(r=>r.status==="出席").length;
  return `<div class="grp" id="g${gi}">
    <div class="grp-h"><span class="dot" style="background:${sp.color}"></span>
      <span class="nm">${sp.name}</span>
      <span class="ct" id="ct${gi}">出席 ${present} / ${g.rows.length}</span></div>
    <div class="time">逢星期${g.c.wd} ${g.c.time||''}</div>
    <div style="display:flex;gap:8px;margin:2px 0 10px">
      <button class="allbtn" onclick="markAll(${gi},'${key}','${date}','出席',this)">✓ 全部出席</button>
      <button class="allbtn" style="background:var(--bad-bg);color:var(--bad)" onclick="markAll(${gi},'${key}','${date}','缺席',this)">✗ 全部缺席</button>
    </div>
    ${g.rows.map((r,ri)=>row(r,gi,ri,key,date)).join("")}</div>`;
}
function row(r,gi,ri,key,date){
  const go=r.status==="出席",no=r.status==="缺席",mk=r.makeup?1:0;
  return `<div class="att" data-mk="${mk}">
    <span class="nm">${r.name}</span>${r.makeup?'<span class="tag">補堂</span>':''}
    <div class="marks">
      <button class="mk go ${go?'on':''}" onclick="mark('${r.name}','${key}','${date}','出席',this,${gi},${mk})">出席</button>
      <button class="mk no ${no?'on':''}" onclick="mark('${r.name}','${key}','${date}','缺席',this,${gi},${mk})">缺席</button>
    </div></div>`;
}
async function mark(name,key,date,status,btn,gi,mk){
  try{
    const r=await api("markAttendance",{name,key,date,status,makeup:!!mk});
    if(!r||!r.ok){ toast(r&&r.err? "存唔到："+r.err : "儲存失敗，請再試"); return; }
    const row=btn.closest(".att"); row.querySelectorAll(".mk").forEach(m=>m.classList.remove("on")); btn.classList.add("on");
    recount(gi);
    toast(`${name}：${status}　已存`);
  }catch(e){ toast("連線錯誤："+((e&&e.message)||e)); }
}
async function markAll(gi,key,date,status,btn){
  const grp=$("#g"+gi); const rows=[...grp.querySelectorAll(".att")];
  const old=btn.textContent; btn.textContent="儲存中…";
  try{
    for(const row of rows){
      const name=row.querySelector(".nm").textContent;
      const mk=row.dataset.mk==="1";
      const r=await api("markAttendance",{name,key,date,status,makeup:mk});
      if(!r||!r.ok) continue;
      row.querySelectorAll(".mk").forEach(m=>m.classList.remove("on"));
      row.querySelector(status==="出席"?".mk.go":".mk.no").classList.add("on");
    }
    recount(gi); toast(status==="出席"?"已全部標出席":"已全部標缺席");
  }catch(e){ toast("連線錯誤："+((e&&e.message)||e)); }
  btn.textContent=old;
}
function recount(gi){
