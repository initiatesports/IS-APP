<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#111111">
<title>IS 排行榜 &amp; 補堂查詢</title>
<style>
:root{
  --cyan:#3ECFCF;--cyan-dim:rgba(62,207,207,0.13);
  --bg:#111;--surface:#1c1c1c;--surface2:#252525;
  --border:rgba(255,255,255,0.08);--text:#f0f0f0;
  --muted:rgba(255,255,255,0.45);--green:#34d399;
  --green-dim:rgba(52,211,153,0.13);--red:#f87171;
  --red-dim:rgba(248,113,113,0.13);--amber:#fbbf24;
  --amber-dim:rgba(251,191,36,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{color-scheme:dark;background:#111}
body{background:#111!important;color:var(--text);font-family:-apple-system,"PingFang HK","PingFang TC","Microsoft JhengHei",sans-serif;min-height:100vh;padding-bottom:48px}

.header{background:var(--surface);border-bottom:2px solid var(--cyan);padding:18px 20px 14px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
.logo-box{width:44px;height:44px;background:var(--cyan);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#111;flex-shrink:0}
.header-text h1{font-size:18px;font-weight:900}
.header-text p{font-size:12px;color:var(--muted);margin-top:2px}
.header-sync{margin-left:auto;font-size:20px;flex-shrink:0;cursor:pointer;padding:4px;border-radius:8px}
.header-sync:active{opacity:0.6}

.sync-banner{display:none;align-items:center;justify-content:center;gap:8px;padding:10px 16px;background:rgba(62,207,207,0.08);border-bottom:1px solid rgba(62,207,207,0.15);font-size:13px;color:var(--cyan)}
.sync-banner.visible{display:flex}
.sync-banner.error{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.15);color:var(--red)}

.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:78px;z-index:49}
.tab-btn{flex:1;padding:11px 4px;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}

.panel{display:none}
.panel.active{display:block}

/* ── LEADERBOARD ── */
.lb-metric-scroll{display:flex;gap:7px;padding:14px 16px 4px;overflow-x:auto;scrollbar-width:none}
.lb-metric-scroll::-webkit-scrollbar{display:none}
.lb-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.lb-tab.active{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan)}

/* Age group section title — box style matching diagram */
.lb-group-title{
  font-size:13px;font-weight:800;letter-spacing:0.04em;
  color:var(--text);background:var(--surface);
  border:1.5px solid var(--border);border-radius:10px;
  padding:6px 16px;display:inline-block;margin-bottom:10px;
}

/* Portrait card grid — 4 columns, wrapping */
.lb-card-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:20px;
}

/* Portrait card */
.lb-pcard{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:14px 8px 12px;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  min-height:110px;
}
.lb-pcard.rank-1{border-color:#ffd700;background:rgba(255,215,0,0.07)}
.lb-pcard.rank-2{border-color:#c0c0c0;background:rgba(192,192,192,0.05)}
.lb-pcard.rank-3{border-color:#cd7f32;background:rgba(205,127,50,0.06)}
.lb-pcard-rank{font-size:18px;line-height:1}
.lb-pcard-name{font-size:13px;font-weight:800;line-height:1.2;word-break:break-all}
.lb-pcard-val{font-size:20px;font-weight:900;color:var(--cyan);line-height:1;margin-top:2px}
.lb-pcard-unit{font-size:10px;font-weight:400;color:var(--muted)}
.lb-pcard-year{font-size:10px;color:var(--muted)}

.lb-empty{padding:32px 16px;color:var(--muted);font-size:14px;text-align:center;line-height:1.7}

/* ── STAR STUDENTS ── */
.star-batch{padding:16px 16px 0}
.star-batch-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.star-batch-title{font-size:17px;font-weight:900;color:var(--cyan)}
.star-batch-meta{font-size:12px;color:var(--muted);margin-top:3px}
.star-batch-count{font-size:12px;color:var(--amber);background:var(--amber-dim);padding:4px 10px;border-radius:20px;font-weight:700;white-space:nowrap}
.star-cards-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:16px;scrollbar-width:none}
.star-cards-row::-webkit-scrollbar{display:none}
.star-card{flex-shrink:0;width:100px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.star-card-photo{width:64px;height:64px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.star-card-photo img{width:100%;height:100%;object-fit:cover}
.star-card-name{font-size:13px;font-weight:800;color:var(--text);line-height:1.2;margin-top:2px}
.star-card-class{font-size:10px;color:var(--muted)}
.star-divider{height:1px;background:var(--border);margin:0 16px}

/* ── SEARCH ── */
.search-section{padding:20px 20px 0}
.search-label{font-size:14px;font-weight:700;margin-bottom:10px}
.search-row{display:flex;gap:8px}
.search-input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:inherit;font-size:17px;padding:14px 16px;outline:none;transition:border-color 0.2s;-webkit-appearance:none}
.search-input:focus{border-color:var(--cyan)}
.search-input::placeholder{color:var(--muted)}
.btn-search{background:var(--cyan);color:#111;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;padding:14px 20px;cursor:pointer;white-space:nowrap}
.btn-search:active{opacity:0.8}
.search-hint{font-size:12px;color:var(--muted);margin-top:8px}
.results{padding:16px 20px 0}
.result-card{background:var(--surface);border:1px solid var(--border);border-left:5px solid var(--cyan);border-radius:16px;padding:18px;margin-bottom:14px}
.result-card.urgent{border-left-color:var(--red)}.result-card.clear{border-left-color:rgba(52,211,153,0.4)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.student-name{font-size:22px;font-weight:900}
.student-class{font-size:13px;color:var(--muted);margin-top:3px}
.big-num{font-size:46px;font-weight:900;line-height:1;color:var(--amber);text-align:right}
.big-num.urgent{color:var(--red)}.big-num.zero{color:rgba(52,211,153,0.5)}
.big-label{font-size:11px;color:var(--muted);text-align:right;margin-top:2px}
.divider{border:none;border-top:1px solid var(--border)}
.abs-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:10px}
.abs-row:last-child{border-bottom:none}
.abs-date{font-size:14px;font-weight:600}
.abs-sub{font-size:12px;color:var(--muted);margin-top:2px}
.pill{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.pill-ok{background:var(--green-dim);color:var(--green)}
.pill-urgent{background:var(--amber-dim);color:var(--amber)}
.all-good{display:flex;align-items:center;gap:10px;padding-top:12px;color:var(--green);font-size:15px}
.expired-warn{margin-top:10px;background:var(--red-dim);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--red)}
.done-note{margin-top:10px;font-size:12px;color:var(--muted)}
.no-result{text-align:center;padding:40px 20px;color:var(--muted);font-size:15px;line-height:1.7}
.no-result .icon{font-size:40px;margin-bottom:10px}
.info-box{margin:20px 20px 0;background:rgba(62,207,207,0.06);border:1px solid rgba(62,207,207,0.15);border-radius:14px;padding:16px}
.info-box p{font-size:13px;color:var(--muted);line-height:1.7}
.info-box strong{color:var(--cyan)}
.footer{text-align:center;margin-top:28px;padding:0 20px;font-size:12px;color:rgba(255,255,255,0.18)}
</style>
</head>
<body>

<div class="header">
  <div class="logo-box">IS</div>
  <div class="header-text">
    <h1>Initiate Sports</h1>
    <p>排行榜 · 優秀學員 · 補堂查詢</p>
  </div>
  <div class="header-sync" id="sync-icon" title="點擊重新載入" onclick="loadFromSheets(true)">☁</div>
</div>

<div class="sync-banner" id="sync-banner">
  <span id="sync-banner-text">⏳ 正在載入最新數據…</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-lb"     onclick="switchTab('lb')">🏆 排行榜</button>
  <button class="tab-btn"        id="tab-star"   onclick="switchTab('star')">⭐ 優秀學員</button>
  <button class="tab-btn"        id="tab-search" onclick="switchTab('search')">📋 補堂查詢</button>
</div>

<!-- LEADERBOARD PANEL -->
<div class="panel active" id="panel-lb">
  <div class="lb-metric-scroll" id="lb-tabs"></div>
  <div id="lb-content" style="padding:0 12px 40px">
    <div class="lb-empty">⏳ 載入中…</div>
  </div>
</div>

<!-- STAR STUDENTS PANEL -->
<div class="panel" id="panel-star">
  <div id="star-list" style="padding-bottom:40px">
    <div class="lb-empty">⏳ 載入中…</div>
  </div>
</div>

<!-- SEARCH PANEL -->
<div class="panel" id="panel-search">
  <div class="search-section">
    <div class="search-label">查詢補堂記錄</div>
    <div class="search-row">
      <input class="search-input" id="q" type="text"
        placeholder="輸入子女全名或部分姓名…"
        autocomplete="off" autocorrect="off" spellcheck="false"
        onkeydown="if(event.key==='Enter'){this.blur();doSearch()}">
      <button class="btn-search" onclick="doSearch()">查詢</button>
    </div>
    <div class="search-hint">輸入全名或部分姓名均可</div>
  </div>
  <div class="results" id="results"></div>
  <div class="info-box">
    <p><strong>補堂規則：</strong>請假 1 節 = 欠 1 節補堂。<br>
    補堂期限為請假當日起計 <strong>2 個月內</strong>。<br>
    如有疑問請聯絡教練。</p>
  </div>
  <div class="footer"><p>© Initiate Sports · 資料每次點名後更新</p></div>
</div>

<script>
// ═══════════════════════
//  API
// ═══════════════════════
const API_URL='https://script.google.com/macros/s/AKfycbxuJ6ypxGG3bZi5SGtgPkedl3fs0mm3SJ3c9DcauTN0SDzfTvSw7nyTBcaaI5vC9GU/exec';
async function apiGet(p){const r=await fetch(API_URL+'?'+new URLSearchParams(p));return r.json();}

// ═══════════════════════
//  STATIC FALLBACK DATA
// ═══════════════════════
let CLASSES={
  c1:{dayZh:'星期一',time:'5–6pm',students:['余悅','孔善盈','何芯蕾','蔡芷彤','羅梓晉','羅君信','羅君浩']},
  c2:{dayZh:'星期一',time:'6–7pm',students:['翟悅廷','郭栩澄','陳柏晞','葉宇浩','梁德瑜','梁德澤','許思溢']},
  c3:{dayZh:'星期三',time:'5–6pm',students:['鄧可澄','鄧幗恩','胡苡晨','胡汐森','文柏升','陳曉瑩','何梓程','梁正軒','陳思允']},
  c4:{dayZh:'星期三',time:'6–7pm',students:['陳卓楠','曾愛斯','王一言','王一心','古詩詠','古卓謙','梁心朗','陳信澄','陳澔泓','梁正宇','蘇穎悠']},
  c5:{dayZh:'星期五',time:'6–7pm',students:['吳瑋軒','黎柏言','陳曉瑩','梁正宇','郭可昕','黃玥晴','黃朗程','姚心穎','羅靖誼','黎柏希','陳焯棋']},
  c6:{dayZh:'星期六',time:'11am–12',students:['張爾淳','張雅堯','黃梓昕','王尉鏇','王斯顏','呂洛希','馬仲然','鄧朗森','陳書雅']},
  c7:{dayZh:'星期六',time:'3–4pm',students:['劉家頤','鄭宇喬','鍾皓惟','周莉晶','李灝宏']}
};
const STUDENT_YEARS={
  "何梓程":2020,"何芯蕾":2018,"余悅":2017,"劉家頤":2017,"古卓謙":2019,"古詩詠":2016,
  "吳瑋軒":2014,"呂洛希":2019,"周莉晶":2018,"姚心穎":2017,"孔善盈":2016,"張爾淳":2017,
  "張雅堯":2019,"文柏升":2019,"曾愛斯":2017,"李灝宏":2018,"梁德澤":2015,"梁德瑜":2019,
  "梁心朗":2016,"梁正宇":2017,"梁正軒":2020,"王一心":2017,"王一言":2017,"王尉鏇":2015,
  "王斯顏":2020,"羅君信":2017,"羅君浩":2019,"羅梓晉":2018,"羅靖誼":2017,"翟悅廷":2017,
  "胡汐森":2018,"胡苡晨":2015,"葉宇浩":2021,"蔡芷彤":2016,"許思溢":2014,"郭可昕":2015,
  "郭栩澄":2016,"鄧可澄":2018,"鄧幗恩":2018,"鄧朗森":2016,"鄭宇喬":2016,"鍾皓惟":2017,
  "陳信澄":2015,"陳卓楠":2017,"陳思允":2016,"陳曉瑩":2014,"陳書雅":2018,"陳澔泓":2017,
  "陳焯棋":2018,"顧舒然":2017,"馬仲然":2018,"黃朗程":2018,"黃梓昕":2017,"黃玥晴":2018,
  "黎柏希":2015,"黎柏言":2018,"蘇穎悠":2017,"陳柏晞":2018
};
const METRICS=[
  {id:'rope30',name:'30秒前繩',unit:'次',higher:true},{id:'bike',name:'單車步',unit:'次',higher:true},
  {id:'double',name:'二重跳',unit:'次',higher:true},{id:'cross',name:'交叉開',unit:'次',higher:true},
  {id:'gripL',name:'握力(左)',unit:'kg',higher:true},{id:'gripR',name:'握力(右)',unit:'kg',higher:true},
  {id:'cmj',name:'CMJ',unit:'cm',higher:true},{id:'ncmj',name:'NCMJ',unit:'cm',higher:true},
  {id:'sj',name:'立定跳遠',unit:'cm',higher:true},{id:'rsi',name:'RSI',unit:'',higher:true}
];
let ABSENCES=[],PERF_RECORDS={},STUDENT_PHOTOS={},STAR_HISTORY=[];
let lbActive='rope30',dataLoaded=false;

// ─ Star period label formula ─
function getStarPeriodLabel(n){
  const s=9+(n-1)*2,y0=2025;
  const y1=y0+Math.floor((s-1)/12),m1=((s-1)%12)+1;
  const y2=y0+Math.floor(s/12),m2=(s%12)+1;
  return y1===y2?`${y1}年 ${m1}–${m2}月`:`${y1}年${m1}月 – ${y2}年${m2}月`;
}

const STAR_FALLBACK=[
  {period:'第一批',label:getStarPeriodLabel(1),students:[
    {name:'鄧可澄',shortName:'德瑜',class:'Wed 6-7'},{name:'翟悅廷',shortName:'若浩',class:'Mon 5-6'},
    {name:'郭栩澄',shortName:'棚澄',class:'Mon 6-7'},{name:'周莉晶',shortName:'周莉晶',class:'Sat 3-4'},
    {name:'鍾皓惟',shortName:'皓惟',class:'Sat 3-4'},{name:'余悅',shortName:'悅悅',class:'Mon 5-6'},
    {name:'張雅堯',shortName:'雅堯',class:'Sat 11-12'},{name:'胡苡晨',shortName:'苡晨',class:'Wed 5-6'},
    {name:'陳信澄',shortName:'信澄',class:'Wed 6-7'},{name:'吳瑋軒',shortName:'瑋軒',class:'Fri 6-7'},
    {name:'羅靖誼',shortName:'靖誼',class:'Fri 6-7'},{name:'陳柏晞',shortName:'柏晞',class:'Mon 6-7'},
    {name:'黃玥晴',shortName:'玥晴',class:'Wed 5-6'},{name:'王尉鏇',shortName:'尉鏇',class:'Sat 11-12'}
  ]},
  {period:'第二批',label:getStarPeriodLabel(2),students:[
    {name:'蔡芷彤',shortName:'芷彤',class:'Mon 5-6'},{name:'孔善盈',shortName:'善盈',class:'Mon 5-6'},
    {name:'羅君信',shortName:'君信',class:'Mon 5-6'},{name:'翟悅廷',shortName:'宇浩',class:'Mon 6-7'},
    {name:'鄧幗恩',shortName:'曉璧',class:'Wed 5-6'},{name:'鄧可澄',shortName:'可澄',class:'Wed 5-6'},
    {name:'陳卓楠',shortName:'卓謙',class:'Wed 6-7'},{name:'郭可昕',shortName:'柏希',class:'Fri 6-7'},
    {name:'黎柏言',shortName:'柏言',class:'Fri 6-7'},{name:'呂洛希',shortName:'洛希',class:'Sat 11-12'},
    {name:'鄭宇喬',shortName:'宇喬',class:'Sat 3-4'},{name:'周莉晶',shortName:'周莉晶',class:'Sat 3-4'},
    {name:'張雅堯',shortName:'雨淳',class:'Sat 11-12'}
  ]}
];

// ═══════════════════════
//  HELPERS
// ═══════════════════════
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function daysLeft(dl){const t=new Date();t.setHours(0,0,0,0);const[y,m,d]=dl.split('-').map(Number);return Math.ceil((new Date(y,m-1,d)-t)/86400000)}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${y}年${+m}月${+d}日`}
function getPB(name,mid){const r=PERF_RECORDS[name]?.[mid];if(!r||!r.length)return null;const m=METRICS.find(x=>x.id===mid);return m.higher?Math.max(...r.map(x=>x.val)):Math.min(...r.map(x=>x.val))}
function ensureDateStr(v){if(!v)return null;const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const d=new Date(s);if(isNaN(d.getTime()))return s;return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
const NAME_ALIASES={'余悅':'悅悅'};
function maskName(n){if(NAME_ALIASES[n])return NAME_ALIASES[n];return n.length<=2?n:n.slice(-2)}

// ═══════════════════════
//  SYNC STATE
// ═══════════════════════
function setSyncState(s){
  const i=document.getElementById('sync-icon'),b=document.getElementById('sync-banner'),bt=document.getElementById('sync-banner-text');
  const c={loading:{i:'⏳',v:true,e:false,t:'⏳ 正在載入最新數據…'},ok:{i:'☁',v:false,e:false,t:''},error:{i:'❌',v:true,e:true,t:'❌ 載入失敗，顯示備份數據。點右上角重試。'}}[s]||{i:'☁',v:false,e:false,t:''};
  if(i)i.textContent=c.i;b.classList.toggle('visible',c.v);b.classList.toggle('error',c.e);bt.textContent=c.t;
}

// ═══════════════════════
//  TABS
// ═══════════════════════
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(tab==='star')renderStarPanel();
}

// ═══════════════════════
//  RESTORE SETTINGS
// ═══════════════════════
function restoreSettings(rows){
  if(!rows||!rows.length)return;
  const map={};
  rows.forEach(r=>{if(!r.key||r.value==null)return;try{map[r.key]=JSON.parse(r.value)}catch(e){map[r.key]=r.value}});
  Object.keys(CLASSES).forEach(cid=>{
    if(map[`class_${cid}_students`])CLASSES[cid].students=map[`class_${cid}_students`];
    if(map[`class_${cid}_dayZh`])CLASSES[cid].dayZh=map[`class_${cid}_dayZh`];
    if(map[`class_${cid}_time`])CLASSES[cid].time=map[`class_${cid}_time`];
  });
  if(map['star_history']){
    try{const p=typeof map['star_history']==='string'?JSON.parse(map['star_history']):map['star_history'];if(Array.isArray(p)&&p.length>0)STAR_HISTORY=p;else STAR_HISTORY=STAR_FALLBACK;}
    catch(e){STAR_HISTORY=STAR_FALLBACK;}
  }else{STAR_HISTORY=STAR_FALLBACK;}
  if(map['student_photos']&&typeof map['student_photos']==='object')Object.assign(STUDENT_PHOTOS,map['student_photos']);
}

// ═══════════════════════
//  LOAD FROM SHEETS
// ═══════════════════════
async function loadFromSheets(manual=false){
  setSyncState('loading');
  try{
    const data=await apiGet({action:'load'});
    if(data.error)throw new Error(data.error);
    restoreSettings(data.settings||[]);
    if(data.absences&&data.absences.length>=0){ABSENCES.length=0;(data.absences||[]).forEach(r=>ABSENCES.push({id:r.id,name:r.name,classId:r.classId,absDate:ensureDateStr(r.absDate),deadline:ensureDateStr(r.deadline),madeUpDate:ensureDateStr(r.madeUpDate)}));}
    PERF_RECORDS={};
    (data.performance||[]).forEach(r=>{if(!PERF_RECORDS[r.name])PERF_RECORDS[r.name]={};if(!PERF_RECORDS[r.name][r.metricId])PERF_RECORDS[r.name][r.metricId]=[];PERF_RECORDS[r.name][r.metricId].push({date:ensureDateStr(r.date),val:+r.val})});
    dataLoaded=true;
    setSyncState('ok');
    renderLB();
    if(document.getElementById('panel-star').classList.contains('active'))renderStarPanel();
    const q=document.getElementById('q')?.value?.trim();if(q)doSearch();
    if(manual)showToast('數據已更新 ☁');
  }catch(e){
    setSyncState('error');
    if(!STAR_HISTORY.length)STAR_HISTORY=STAR_FALLBACK;
    renderLB();
  }
}

function showToast(msg){
  let el=document.getElementById('_t');
  if(!el){el=document.createElement('div');el.id='_t';el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c1c1c;color:#f0f0f0;padding:10px 20px;border-radius:20px;font-size:14px;border:1px solid rgba(255,255,255,0.1);opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:9999';document.body.appendChild(el);}
  el.textContent=msg;el.style.opacity='1';el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(-50%) translateY(20px)';},2200);
}

// ═══════════════════════════════════════════════════════
//  LEADERBOARD — 4-column portrait grid, youngest first
// ═══════════════════════════════════════════════════════
function getAllStudentsWithYear(){
  const seen=new Set(),list=[];
  Object.values(CLASSES).forEach(cls=>cls.students.forEach(name=>{if(!seen.has(name)){seen.add(name);list.push({name,year:STUDENT_YEARS[name]||null})}}));
  return list;
}

function renderLB(){
  const m=METRICS.find(x=>x.id===lbActive);
  document.getElementById('lb-tabs').innerHTML=METRICS.map(mt=>`<div class="lb-tab ${lbActive===mt.id?'active':''}" onclick="setLB('${mt.id}')">${mt.name}</div>`).join('');

  const all=getAllStudentsWithYear();
  const entries=[];
  all.forEach(({name,year})=>{const pb=getPB(name,lbActive);if(pb!==null)entries.push({name,val:pb,year})});
  entries.sort((a,b)=>m.higher?b.val-a.val:a.val-b.val);

  if(!entries.length){
    document.getElementById('lb-content').innerHTML=`<div class="lb-empty">${dataLoaded?`暫無 ${m.name} 成績資料<br><span style="font-size:12px">數據由教練記錄後自動更新</span>`:'<span style="font-size:13px">⏳ 載入中…</span>'}</div>`;
    return;
  }

  // Build a portrait-card grid group
  function makeGroup(list,title){
    if(!list.length)return'';
    const sorted=[...list].sort((a,b)=>m.higher?b.val-a.val:a.val-b.val);
    const cards=sorted.map((e,i)=>{
      const rc=i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
      const re=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
      return `<div class="lb-pcard ${rc}">
        <div class="lb-pcard-rank">${re}</div>
        <div class="lb-pcard-name">${maskName(e.name)}</div>
        <div class="lb-pcard-val">${e.val}<span class="lb-pcard-unit"> ${m.unit||'RSI'}</span></div>
        <div class="lb-pcard-year">${e.year?e.year+'年生':''}</div>
      </div>`;
    }).join('');
    return `<div class="lb-group-title">${title}</div><div class="lb-card-grid">${cards}</div>`;
  }

  const cy=new Date().getFullYear();
  const withYear=entries.filter(e=>e.year);
  let html='';

  // Youngest first
  const younger=withYear.filter(e=>e.year>=2020);
  if(younger.length)html+=makeGroup(younger,`${cy-2020}歲或以下`);
  const olderYears=[...new Set(withYear.filter(e=>e.year<=2019).map(e=>e.year))].sort((a,b)=>b-a);
  olderYears.forEach(yr=>html+=makeGroup(withYear.filter(e=>e.year===yr),`${cy-yr}歲`));

  // Overall at bottom
  html+=makeGroup(entries,'總排行榜');

  document.getElementById('lb-content').innerHTML=`<div style="padding:0 0 8px">${html}</div>`;
}

function setLB(id){lbActive=id;renderLB();}

// ═══════════════════════
//  STAR STUDENTS PANEL
// ═══════════════════════
function renderStarPanel(){
  const el=document.getElementById('star-list');
  const list=STAR_HISTORY.length?STAR_HISTORY:STAR_FALLBACK;
  if(!list.length){el.innerHTML=`<div class="lb-empty" style="padding-top:40px">⭐ 暫無優秀學員記錄<br><span style="font-size:12px">由教練記錄後自動更新</span></div>`;return;}
  el.innerHTML=list.slice().reverse().map(batch=>{
    const cards=batch.students.map(s=>{
      const photo=STUDENT_PHOTOS[s.name];
      return `<div class="star-card">
        <div class="star-card-photo">${photo?`<img src="${photo}" alt="${s.shortName||s.name}">`:'👤'}</div>
        <div class="star-card-name">${s.shortName||s.name}</div>
        <div class="star-card-class">${s.class||''}</div>
      </div>`;
    }).join('');
    return `<div class="star-batch">
      <div class="star-batch-header">
        <div>
          <div class="star-batch-title">⭐ ${batch.period} 優秀學員</div>
          <div class="star-batch-meta">${batch.label||''}</div>
        </div>
        <div class="star-batch-count">${batch.students.length} 位</div>
      </div>
      <div class="star-cards-row">${cards}</div>
    </div><div class="star-divider"></div>`;
  }).join('')+`<div class="footer" style="padding-top:8px"><p>每兩個月評選一次 · 由教練記錄</p></div>`;
}

// ═══════════════════════
//  SEARCH
// ═══════════════════════
function doSearch(){
  const q=document.getElementById('q').value.trim(),out=document.getElementById('results');
  if(!q){out.innerHTML='';return;}
  const matches=[],seen=new Set();
  Object.entries(CLASSES).forEach(([cid,cls])=>cls.students.forEach(name=>{const k=name+'|'+cid;if(name.includes(q)&&!seen.has(k)){seen.add(k);matches.push({name,cid,cls});}}));
  if(!matches.length){out.innerHTML=`<div class="no-result"><div class="icon">🔍</div>找不到「${q}」<br>請確認姓名是否正確</div>`;return;}
  const now=todayStr();
  out.innerHTML=matches.map(({name,cid,cls})=>{
    const pa=ABSENCES.filter(a=>a.name===name&&!a.madeUpDate&&a.deadline&&a.deadline>=now).sort((a,b)=>a.deadline.localeCompare(b.deadline));
    const pe=ABSENCES.filter(a=>a.name===name&&!a.madeUpDate&&a.deadline&&a.deadline<now);
    const done=ABSENCES.filter(a=>a.name===name&&a.madeUpDate).length;
    const n=pa.length,urg=pa.some(a=>daysLeft(a.deadline)<=14);
    const cc=n===0?'clear':urg?'urgent':'',bc=n===0?'zero':urg?'urgent':'';
    const rows=n>0?`<div style="margin-top:4px">${pa.map((a,i)=>{const dl=daysLeft(a.deadline),u=dl<=14;return`<div class="abs-row"><div><div class="abs-date">第 ${i+1} 節 — ${fmtDate(a.absDate)} 請假</div><div class="abs-sub">補堂期限：${fmtDate(a.deadline)}</div></div><span class="pill ${u?'pill-urgent':'pill-ok'}">${u?'⚠ 剩'+dl+'天':'剩'+dl+'天'}</span></div>`}).join('')}</div>`:`<div class="all-good">✅ 暫無待補堂，繼續保持！</div>`;
    const exp=pe.length?`<div class="expired-warn">⚠ 另有 ${pe.length} 節補堂期限已過，請聯絡教練跟進</div>`:'';
    const dn=done?`<div class="done-note">✓ 已完成補堂 ${done} 節</div>`:'';
    return`<div class="result-card ${cc}"><div class="card-top"><div><div class="student-name">${name}</div><div class="student-class">${cls.dayZh} ${cls.time}</div></div><div><div class="big-num ${bc}">${n}</div><div class="big-label">節待補堂</div></div></div><hr class="divider">${rows}${exp}${dn}</div>`;
  }).join('');
}

// ═══════════════════════
//  INIT
// ═══════════════════════
renderLB();
loadFromSheets();
</script>
