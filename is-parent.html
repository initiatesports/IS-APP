<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<meta name="theme-color" content="#111111">
<title>IS 補堂查詢</title>
<style>
:root {
  --cyan: #3ECFCF;
  --bg: #111;
  --surface: #1c1c1c;
  --surface2: #252525;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f0;
  --muted: rgba(255,255,255,0.45);
  --green: #34d399;
  --red: #f87171;
  --amber: #fbbf24;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html {
  color-scheme: dark;
  background: #111;
}
body {
  background: #111 !important;
  color: var(--text);
  font-family: -apple-system, "PingFang HK", "PingFang TC", sans-serif;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 2px solid var(--cyan);
  padding: 20px 20px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo-box {
  width: 44px; height: 44px;
  background: var(--cyan);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900;
  color: #111; flex-shrink: 0;
}
.header-text h1 { font-size: 18px; font-weight: 900; }
.header-text p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* Search */
.search-section { padding: 24px 20px 0; }
.search-label { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
.search-row { display: flex; gap: 8px; }
.search-input {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 17px;
  padding: 14px 16px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.search-input:focus { border-color: var(--cyan); }
.search-input::placeholder { color: var(--muted); }
.btn-search {
  background: var(--cyan);
  color: #111;
  border: none;
  border-radius: 14px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  padding: 14px 20px;
  cursor: pointer;
  white-space: nowrap;
  -webkit-appearance: none;
}
.btn-search:active { opacity: 0.8; }
.search-hint { font-size: 12px; color: var(--muted); margin-top: 8px; }

/* Results */
.results { padding: 20px 20px 0; }

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 5px solid var(--cyan);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 14px;
}
.result-card.urgent { border-left-color: var(--red); }
.result-card.clear  { border-left-color: rgba(52,211,153,0.4); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.student-name { font-size: 22px; font-weight: 900; }
.student-class { font-size: 13px; color: var(--muted); margin-top: 3px; }

.big-num { font-size: 46px; font-weight: 900; line-height: 1; color: var(--amber); text-align: right; }
.big-num.urgent { color: var(--red); }
.big-num.zero   { color: rgba(52,211,153,0.5); }
.big-label { font-size: 11px; color: var(--muted); text-align: right; margin-top: 2px; }

.divider { border: none; border-top: 1px solid var(--border); margin: 0; }

.abs-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.abs-row:last-child { border-bottom: none; }
.abs-date { font-size: 14px; font-weight: 600; }
.abs-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }

.pill {
  font-size: 12px; font-weight: 700;
  padding: 5px 12px; border-radius: 20px;
  white-space: nowrap; flex-shrink: 0;
}
.pill-ok     { background: rgba(52,211,153,0.15);  color: var(--green); }
.pill-urgent { background: rgba(251,191,36,0.15);  color: var(--amber); }
.pill-over   { background: rgba(248,113,113,0.15); color: var(--red); }

.all-good {
  display: flex; align-items: center; gap: 10px;
  padding-top: 12px;
  color: var(--green); font-size: 15px;
}

.expired-warn {
  margin-top: 10px;
  background: rgba(248,113,113,0.1);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 13px;
  color: var(--red);
}

.done-note {
  margin-top: 10px;
  font-size: 12px;
  color: var(--muted);
}

/* Empty / Error */
.no-result {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 15px;
  line-height: 1.7;
}
.no-result .icon { font-size: 40px; margin-bottom: 10px; }

/* Info box */
.info-box {
  margin: 20px 20px 0;
  background: rgba(62,207,207,0.06);
  border: 1px solid rgba(62,207,207,0.15);
  border-radius: 14px;
  padding: 16px;
}
.info-box p { font-size: 13px; color: var(--muted); line-height: 1.7; }
.info-box strong { color: var(--cyan); }

/* Footer */
.footer {
  text-align: center;
  margin-top: 30px;
  padding: 0 20px;
  font-size: 12px;
  color: rgba(255,255,255,0.2);
}
/* Leaderboard */
.lb-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 16px 8px; font-size: 16px; font-weight: 700; color: var(--text);
}
.lb-metric-row {
  display: flex; gap: 6px; padding: 0 16px 10px;
  overflow-x: auto; scrollbar-width: none;
}
.lb-metric-row::-webkit-scrollbar { display: none; }
.lb-tab {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--muted); font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.lb-tab.active { background: rgba(62,207,207,0.15); border-color: var(--cyan); color: var(--cyan); }
.lb-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.lb-row:last-child { border-bottom: none; }
.lb-num { font-size: 18px; font-weight: 900; width: 28px; color: var(--muted); text-align:center; flex-shrink:0; }
.lb-num.gold { color: #ffd700; }
.lb-num.silver { color: #c0c0c0; }
.lb-num.bronze { color: #cd7f32; }
.lb-name { flex: 1; font-size: 14px; font-weight: 700; }
.lb-val { font-size: 18px; font-weight: 900; color: var(--cyan); }
.lb-unit { font-size: 10px; color: var(--muted); display: block; text-align: right; }
.lb-empty { padding: 20px 16px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

  <div class="logo-box">IS</div>
  <div class="header-text">
    <h1>補堂查詢</h1>
    <p>Initiate Sports · Aim High Jump High</p>
  </div>
</div>

<div class="search-section">
  <div class="search-label">輸入子女姓名</div>
  <div class="search-row">
    <input class="search-input" id="q" type="text"
      placeholder="例：陳小明、李小華…"
      autocomplete="off" autocorrect="off" spellcheck="false"
      onkeydown="if(event.key==='Enter'){this.blur();search()}">
    <button class="btn-search" onclick="search()">查詢</button>
  </div>
  <div class="search-hint">輸入全名或部分姓名均可</div>
</div>

<div class="results" id="results"></div>

<!-- Leaderboard section — hidden after search -->
<div id="lb-section">
  <div class="lb-header">
    <span>🏆 成績排行榜</span>
    <span style="font-size:11px;color:var(--muted)">各項目最佳成績</span>
  </div>
  <div class="lb-metric-row" id="lb-tabs"></div>
  <div id="lb-list" style="padding:0 16px 12px"></div>
</div>

<div class="info-box">
  <p>
    <strong>補堂規則：</strong>請假 1 節 = 欠 1 節補堂。<br>
    補堂期限為請假當日起計 <strong>2 個月內</strong>。<br>
    如有疑問請聯絡教練。
  </p>
</div>

<div class="footer">
  <p>© Initiate Sports · 資料每次點名後更新</p>
</div>

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function todayStr() { return new Date().toISOString().split('T')[0]; }

function daysLeft(dl) {
  return Math.ceil((new Date(dl) - new Date()) / 86400000);
}

function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${y}年${+m}月${+d}日`;
}

function isExpired(dl) { return dl < todayStr(); }

// ═══════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════
function search() {
  const q = document.getElementById('q').value.trim();
  const out = document.getElementById('results');
  const lb  = document.getElementById('lb-section');
  if (!q) {
    out.innerHTML = '';
    if (lb) lb.style.display = 'block';
    return;
  }
  // Hide leaderboard after search
  if (lb) lb.style.display = 'none';

  // Find matching students across all classes (may appear in multiple)
  const matches = [];
  const seen = new Set();
  Object.entries(CLASSES).forEach(([cid, cls]) => {
    cls.students.forEach(name => {
      const key = name + '|' + cid;
      if (name.includes(q) && !seen.has(key)) {
        seen.add(key);
        matches.push({ name, cid, cls });
      }
    });
  });

  if (!matches.length) {
    out.innerHTML = `
      <div class="no-result">
        <div class="icon">🔍</div>
        找不到「${q}」<br>
        請確認姓名是否正確
      </div>`;
    return;
  }

  const now = todayStr();
  out.innerHTML = matches.map(({ name, cid, cls }) => {
    const pendingActive = ABSENCES
      .filter(a => a.name===name && !a.madeUpDate && a.deadline>=now)
      .sort((a,b) => a.deadline.localeCompare(b.deadline));
    const pendingExpired = ABSENCES
      .filter(a => a.name===name && !a.madeUpDate && a.deadline<now);
    const completed = ABSENCES.filter(a => a.name===name && a.madeUpDate).length;

    const n = pendingActive.length;
    const hasUrgent = pendingActive.some(a => daysLeft(a.deadline) <= 14);
    const cardCls = n===0 ? 'clear' : hasUrgent ? 'urgent' : '';
    const bigCls  = n===0 ? 'zero'  : hasUrgent ? 'urgent' : '';

    // Absence rows
    let rowsHtml = '';
    if (n > 0) {
      rowsHtml = `<div style="margin-top:4px">` +
        pendingActive.map((a, i) => {
          const dl  = daysLeft(a.deadline);
          const urg = dl <= 14;
          const over = isExpired(a.deadline);
          return `
          <div class="abs-row">
            <div>
              <div class="abs-date">第 ${i+1} 節 — ${fmtDate(a.absDate)} 請假</div>
              <div class="abs-sub">補堂期限：${fmtDate(a.deadline)}</div>
            </div>
            <span class="pill ${urg?'pill-urgent':'pill-ok'}">${urg ? '⚠ 剩'+dl+'天' : '剩'+dl+'天'}</span>
          </div>`;
        }).join('') + `</div>`;
    } else {
      rowsHtml = `<div class="all-good">✅ 暫無待補堂，繼續保持！</div>`;
    }

    const expiredHtml = pendingExpired.length
      ? `<div class="expired-warn">⚠ 另有 ${pendingExpired.length} 節補堂期限已過，請聯絡教練跟進</div>`
      : '';

    const doneHtml = completed
      ? `<div class="done-note">✓ 已完成補堂 ${completed} 節</div>`
      : '';

    return `
    <div class="result-card ${cardCls}">
      <div class="card-top">
        <div>
          <div class="student-name">${name}</div>
          <div class="student-class">${cls.dayZh} ${cls.time}</div>
        </div>
        <div>
          <div class="big-num ${bigCls}">${n}</div>
          <div class="big-label">節待補堂</div>
        </div>
      </div>
      <hr class="divider">
      ${rowsHtml}
      ${expiredHtml}
      ${doneHtml}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
//  LEADERBOARD — 從 Google Sheets 載入
// ═══════════════════════════════════════
const METRICS = [

const API_URL = 'https://script.google.com/macros/s/AKfycbxuJ6ypxGG3bZi5SGtgPkedl3fs0mm3SJ3c9DcauTN0SDzfTvSw7nyTBcaaI5vC9GU/exec';
let PERF_RECORDS = {};
let lbActive = 'rope30';

// Load performance data from Sheets
async function loadPerfFromSheets() {
  try {
    const res = await fetch(API_URL + '?action=load');
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Rebuild PERF_RECORDS
    PERF_RECORDS = {};
    (data.performance || []).forEach(row => {
      if (!PERF_RECORDS[row.name]) PERF_RECORDS[row.name] = {};
      if (!PERF_RECORDS[row.name][row.metricId]) PERF_RECORDS[row.name][row.metricId] = [];
      PERF_RECORDS[row.name][row.metricId].push({ date: row.date, val: +row.val });
    });

    // Also update ABSENCES from Sheets
    if (data.absences?.length) {
      ABSENCES.length = 0;
      data.absences.forEach(row => {
        ABSENCES.push({
          id: row.id, name: row.name, classId: row.classId,
          absDate: row.absDate, deadline: row.deadline,
          madeUpDate: row.madeUpDate || null,
        });
      });
    }

    renderLB();
  } catch(e) {
    // Silently fail — show empty leaderboard
    renderLB();
  }
}

function getPB(name, mid) {
  const recs = PERF_RECORDS[name]?.[mid];
  if (!recs || !recs.length) return null;
  const m = METRICS.find(x => x.id === mid);
  return m.higher ? Math.max(...recs.map(r=>r.val)) : Math.min(...recs.map(r=>r.val));
}

function renderLB() {
  // Tabs
  document.getElementById('lb-tabs').innerHTML = METRICS.map(m =>
    `<div class="lb-tab ${lbActive===m.id?'active':''}" onclick="setLB('${m.id}')">${m.name}</div>`
  ).join('');

  const m = METRICS.find(x => x.id === lbActive);
  const entries = [];
  Object.values(CLASSES).forEach(cls => {
    cls.students.forEach(name => {
      const pb = getPB(name, lbActive);
      if (pb !== null) entries.push({ name, val: pb });
    });
  });
  entries.sort((a,b) => m.higher ? b.val - a.val : a.val - b.val);

  if (!entries.length) {
    document.getElementById('lb-list').innerHTML =
      `<div class="lb-empty" style="color:var(--muted);padding:20px;font-size:13px">暫無${m.name}成績資料</div>`;
    return;
  }

  document.getElementById('lb-list').innerHTML = entries.slice(0, 10).map((e, i) => {
    const nc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const nt = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    return `
    <div class="lb-row">
      <div class="lb-num ${nc}">${nt}</div>
      <div class="lb-name">${e.name}</div>
      <div class="lb-val">${e.val}<span class="lb-unit">${m.unit||'RSI'}</span></div>
    </div>`;
  }).join('');
}

function setLB(id) { lbActive = id; renderLB(); }

// Init — load from Sheets then render
loadPerfFromSheets();
</script>
