<meta name="theme-color" content="#111111">
<title>IS 出席補堂管理</title>
<style>
:root{
  --cyan:#3ECFCF; --cyan-dim:rgba(62,207,207,0.15);
  --bg:#111; --surface:#1c1c1c; --surface2:#252525;
  --border:rgba(255,255,255,0.08);
  --text:#f0f0f0; --fg:#f0f0f0; --muted:rgba(255,255,255,0.45);
  --green:#34d399; --green-dim:rgba(52,211,153,0.15);
  --red:#f87171; --red-dim:rgba(248,113,113,0.15);
  --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.15);
  --amber:#fbbf24; --amber-dim:rgba(251,191,36,0.12);
  --gold:#fbbf24;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{color-scheme:dark;background:#111;}
html,body{
  width:100%;height:100%;background:#111!important;color:var(--text);
  font-family:-apple-system,"PingFang HK","PingFang TC","Microsoft JhengHei","Noto Sans HK",sans-serif;
  overflow:hidden;overscroll-behavior:none;
}
#app{display:flex;flex-direction:column;width:100%;height:100vh;height:100dvh;overflow:hidden;}

/* HEADER */
.app-header{
  flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);
  padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;gap:12px;min-height:60px;
}
.header-back{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;
  font-size:20px;flex-shrink:0;
}
.header-logo{width:32px;height:32px;object-fit:contain;border-radius:7px;flex-shrink:0;background:#fff;padding:3px;box-sizing:border-box;}
.header-title{flex:1;min-width:0;}
.header-title h1{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#header-subtitle-text{font-size:12px;color:var(--muted);margin-top:1px;}
#sync-indicator{font-size:20px;flex-shrink:0;cursor:pointer;}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.screen{display:none;}
.screen.active{display:block;}

/* BOTTOM NAV */
.bottom-nav{
  flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding-bottom:var(--safe-bot);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;
  cursor:pointer;transition:color 0.15s;color:var(--muted);border:none;background:transparent;font-family:inherit;
}
.nav-item.active{color:var(--cyan);}
.nav-icon{font-size:22px;line-height:1;}
.nav-label{font-size:10px;font-weight:600;}

/* HOME */
.home-greeting{padding:20px 16px 8px;}
.home-greeting h2{font-size:22px;font-weight:900;color:var(--cyan);}
.home-greeting p{font-size:13px;color:var(--muted);margin-top:2px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
.stat-card .num{font-size:32px;font-weight:900;line-height:1;color:var(--text);}
.stat-card .num.warn{color:var(--amber);}
.stat-card .num.danger{color:var(--red);}
.stat-card .num.ok{color:var(--green);}
.stat-card .lbl{font-size:12px;color:var(--muted);margin-top:4px;}
.section-header{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;padding:16px 16px 8px;}
.class-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;}
.class-row{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color 0.15s,background 0.15s;
  -webkit-user-select:none;user-select:none;
}
.class-row:active{background:var(--surface2);border-color:var(--cyan);}
.class-day-pill{background:var(--cyan-dim);color:var(--cyan);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.class-row-info{flex:1;min-width:0;}
.class-row-info h3{font-size:15px;font-weight:700;}
.class-row-info p{font-size:12px;color:var(--muted);margin-top:2px;}
.class-row-arrow{color:var(--muted);font-size:18px;}
.class-pending-badge{background:var(--amber-dim);color:var(--amber);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}

/* ROLL */
.date-picker-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 0 0;}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px;}
.month-nav-label{font-size:15px;font-weight:700;color:var(--text);}
.month-nav-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:18px;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s;
}
.month-nav-btn:active{background:var(--surface);}
.date-pills-row{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.date-pills-row::-webkit-scrollbar{display:none;}
.date-pill{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:12px;
  border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;transition:all 0.15s;position:relative;min-width:52px;
}
.date-pill:active{transform:scale(0.95);}
.date-pill.today{border-color:rgba(62,207,207,0.5);background:var(--cyan-dim);}
.date-pill.selected{border-color:var(--cyan);background:var(--cyan);}
.date-pill.selected .dp-day,.date-pill.selected .dp-date{color:#111;}
.date-pill.saved::after{
  content:'✓';position:absolute;top:-6px;right:-6px;background:var(--green);color:#111;font-size:9px;font-weight:900;
  width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg);
}
.date-pill.future{opacity:0.45;}
.dp-day{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.dp-date{font-size:18px;font-weight:900;color:var(--text);line-height:1;}
.roll-info-bar{background:var(--cyan-dim);border-bottom:1px solid rgba(62,207,207,0.2);padding:8px 16px;font-size:12px;color:var(--cyan);display:flex;align-items:center;gap:6px;}
.already-saved-bar{background:var(--amber-dim);border-bottom:1px solid rgba(251,191,36,0.2);padding:8px 16px;font-size:12px;color:var(--amber);display:flex;align-items:center;gap:6px;}
.student-list{padding:8px 12px;display:flex;flex-direction:column;gap:6px;}
.student-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;transition:border-color 0.15s;}
.student-card.is-absent{border-color:var(--red);background:var(--red-dim);}
.student-card.is-makeup{border-color:var(--purple);background:var(--purple-dim);}
.student-card.is-present{border-color:var(--green);}
.student-card.is-exempt{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.03);opacity:0.65;}
.student-name-wrap{flex:1;min-width:0;}
.student-name{font-size:16px;font-weight:700;}
.student-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.student-sub.warn{color:var(--amber);}
.student-sub.danger{color:var(--red);}
.student-btns{display:flex;gap:4px;flex-shrink:0;}
.s-btn{
  width:40px;height:36px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s;-webkit-user-select:none;user-select:none;
}
.s-btn:active{transform:scale(0.9);}
.s-btn.sel-present{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.s-btn.sel-absent{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.s-btn.sel-makeup{background:var(--purple-dim);border-color:var(--purple);color:var(--purple);}
.s-btn.sel-exempt{background:rgba(100,100,100,0.2);border-color:rgba(255,255,255,0.25);color:rgba(255,255,255,0.4);}
.save-bar{position:sticky;bottom:0;padding:10px 16px calc(10px + var(--safe-bot));background:var(--bg);border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;}
.btn-save{flex:1;background:var(--cyan);color:#111;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:700;padding:14px;cursor:pointer;transition:opacity 0.15s;}
.btn-save:active{opacity:0.8;}
.save-count{font-size:12px;color:var(--muted);text-align:center;white-space:nowrap;}
.save-count span{color:var(--red);font-weight:700;}

/* MAKEUP */
.makeup-section{padding:0 12px 16px;}
.hist-period-bar{display:flex;gap:8px;margin:12px 0 14px;overflow-x:auto;scrollbar-width:none;}
.hist-period-bar::-webkit-scrollbar{display:none;}
.hist-period-btn{flex-shrink:0;background:var(--surface,#1c1c1c);border:1.5px solid var(--border,rgba(255,255,255,0.08));color:var(--muted,rgba(255,255,255,0.45));border-radius:20px;padding:8px 16px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.hist-period-btn.on{background:var(--cyan,#3ECFCF);border-color:var(--cyan,#3ECFCF);color:#111;}
.makeup-filter-bar{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.makeup-filter-bar::-webkit-scrollbar{display:none;}
.filter-pill{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.filter-pill.active{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan);}
.makeup-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;}
.makeup-card.overdue{border-color:rgba(248,113,113,0.4);}
.makeup-card.urgent{border-color:rgba(251,191,36,0.4);}
.makeup-card.done{opacity:0.5;}
.makeup-card-left{flex:1;min-width:0;}
.makeup-name{font-size:16px;font-weight:700;}
.makeup-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.makeup-deadline{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:6px;}
.makeup-deadline.ok{background:var(--green-dim);color:var(--green);}
.makeup-deadline.urgent{background:var(--amber-dim);color:var(--amber);}
.makeup-deadline.overdue{background:var(--red-dim);color:var(--red);}
.makeup-deadline.done{background:var(--cyan-dim);color:var(--cyan);}
.makeup-card-action{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.btn-makeup-done{background:var(--purple-dim);border:1px solid var(--purple);color:var(--purple);border-radius:10px;padding:7px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-makeup-done:active{opacity:0.7;}
.mk-class-title{font-size:13px;font-weight:700;color:var(--cyan);padding:14px 4px 8px;display:flex;align-items:center;gap:8px;}
.mk-class-title .cnt{font-size:11px;color:var(--muted);font-weight:600;}

/* HISTORY */
.history-session{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;}
.history-session-header{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.history-session-header h3{font-size:14px;font-weight:700;}
.history-session-header p{font-size:12px;color:var(--muted);margin-top:2px;}
.history-toggle{color:var(--muted);font-size:18px;transition:transform 0.2s;}
.history-session.open .history-toggle{transform:rotate(180deg);}
.history-session-body{display:none;border-top:1px solid var(--border);}
.history-session.open .history-session-body{display:block;}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.history-row:last-child{border-bottom:none;}
.history-row .st-present{color:var(--green);}
.history-row .st-absent{color:var(--red);}
.history-row .st-makeup{color:var(--purple);}
.history-row .st-exempt{color:var(--muted);}

/* SETTINGS */
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;}
.settings-section-title{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:14px 16px 8px;}
.settings-class-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;transition:background 0.15s;}
.settings-class-header:active{background:var(--surface2);}
.sch-left{display:flex;align-items:center;gap:10px;}
.sch-pill{background:var(--cyan-dim);color:var(--cyan);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.sch-name{font-size:14px;font-weight:700;}
.sch-count{font-size:12px;color:var(--muted);margin-top:1px;}
.sch-arrow{color:var(--muted);font-size:18px;transition:transform 0.2s;}
.settings-class-open .sch-arrow{transform:rotate(90deg);}
.settings-class-body{display:none;border-top:1px solid var(--border);}
.settings-class-open .settings-class-body{display:block;}
.settings-student-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);font-size:14px;}
.settings-student-row:last-child{border-bottom:none;}
.btn-remove-student{background:var(--red-dim);border:1px solid var(--red);color:var(--red);border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;padding:4px 10px;cursor:pointer;}
.btn-remove-student:active{opacity:0.7;}
.settings-add-row{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface2);}
.settings-add-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:8px 10px;outline:none;color-scheme:dark;}
.settings-add-input:focus{border-color:var(--cyan);}
.btn-add-student{background:var(--cyan);color:#111;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;padding:8px 14px;cursor:pointer;white-space:nowrap;}
.btn-add-student:active{opacity:0.8;}
.dow-selector{display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.dow-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.dow-btn.active{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan);}
.holiday-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.holiday-row:last-child{border-bottom:none;}
.btn-remove-holiday{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;}
.btn-remove-holiday:active{color:var(--red);}
.settings-add-date-row{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface2);}
.settings-date-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:8px 10px;outline:none;color-scheme:dark;-webkit-appearance:none;}
.settings-date-input:focus{border-color:var(--cyan);}

/* TODAY · 每日 Sheet 點名 */
.today-bar{display:flex;gap:8px;align-items:center;padding:12px 16px 8px;}
.today-date{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:15px;padding:10px 12px;outline:none;color-scheme:dark;}
.today-date:focus{border-color:var(--cyan);}
.today-mini{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-weight:600;padding:10px 12px;cursor:pointer;white-space:nowrap;}
.today-mini:active{background:var(--surface);}
.health-line{padding:0 16px 8px;font-size:12px;font-weight:600;}
.allbtn{flex:1;border:1.5px solid var(--green);background:var(--green-dim);color:var(--green);border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;padding:10px;cursor:pointer;}
.allbtn:active{opacity:0.8;}
.allbtn.bad{border-color:var(--red);background:var(--red-dim);color:var(--red);}
.weather-btn{width:calc(100% - 32px);margin:0 16px 12px;border:1.5px solid var(--amber);background:var(--amber-dim);color:var(--amber);border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;padding:12px;cursor:pointer;}
.weather-btn:active{opacity:0.8;}
.cgrp{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin:0 12px 12px;overflow:hidden;}
.grp-h{display:flex;align-items:center;gap:8px;padding:12px 14px 4px;font-size:15px;font-weight:800;}
.grp-h .dot{width:9px;height:9px;border-radius:50%;background:var(--cyan);flex-shrink:0;}
.grp-h .t{font-size:12px;font-weight:600;color:var(--muted);margin-left:auto;}
.ccount{padding:0 14px 8px;font-size:12px;color:var(--muted);}
.ccount b{color:var(--green);font-size:14px;}
.ccount .miss{color:var(--amber);font-weight:700;}
.allrow{display:flex;gap:8px;padding:0 14px 10px;}
.att{display:flex;align-items:center;gap:8px;padding:10px 14px;border-top:1px solid var(--border);}
.att .nm{font-size:15px;font-weight:600;}
.att .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--purple-dim);color:var(--purple);}
.att .marks{margin-left:auto;display:flex;gap:6px;}
.att .mk{width:42px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;}
.att .mk:active{transform:scale(0.92);}
.att .mk.go.on{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.att .mk.no.on{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.cancelpanel{background:var(--surface);border:1px solid var(--amber);border-radius:14px;margin:0 12px 12px;padding:14px;}
.cancelpanel .cp-h{font-size:13px;font-weight:700;color:var(--amber);margin-bottom:8px;}
.cancelpanel textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;line-height:1.5;padding:10px;resize:vertical;}
.cancelpanel .btn-copy{margin-top:8px;width:100%;background:var(--amber);color:#111;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;padding:11px;cursor:pointer;}

/* EMPTY / TOAST */
.empty-state{padding:60px 24px;text-align:center;color:var(--muted);}
.empty-state .icon{font-size:48px;margin-bottom:12px;}
.empty-state p{font-size:15px;line-height:1.6;}
#toast{
  position:fixed;bottom:calc(70px + var(--safe-bot) + 12px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;
  border:1px solid var(--border);opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:9999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

  <!-- SCREENS -->
  <div class="scroll-area" id="scroll-area">

    <!-- HOME -->
    <div class="screen active" id="screen-home">
      <div class="home-greeting">
        <h2 id="greeting-text"></h2>
        <p id="greeting-date"></p>
      </div>
      <div class="stats-grid" id="home-stats"></div>
      <div id="home-dashboard"></div>
      <div class="section-header">今日課堂</div>
      <div class="class-list" id="today-classes"></div>
      <div class="section-header">所有班別</div>
      <div class="class-list" id="all-classes"></div>
      <div style="height:80px"></div>
    </div>

    <!-- TODAY · 每日 Sheet 點名（同 Google Sheet 即時同步）-->
    <div class="screen" id="screen-today">
      <div class="health-line" id="health-line">● 檢查連線中…</div>
      <div class="today-bar">
        <input type="date" class="today-date" id="today-date">
        <button class="today-mini" onclick="coachToday()">今日</button>
        <button class="today-mini" onclick="loadDaily()">↻</button>
      </div>
      <button class="weather-btn" onclick="weatherCancel()">🌧 天氣停課（當日全部班別，照收一堂）</button>
      <button class="weather-btn" style="background:rgba(46,158,107,.12);border-color:rgba(46,158,107,.45);color:var(--green,#2e9e6b)" onclick="freeCancel()">🚫 停課・不收費（當日全部班別，學費自動少計一堂）</button>
      <div id="daily-list"></div>
      <div style="height:80px"></div>
    </div>

    <!-- ROLL -->
    <div class="screen" id="screen-roll">
      <div class="date-picker-wrap">
        <div class="month-nav">
          <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
          <div class="month-nav-label" id="month-nav-label">—</div>
          <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
        </div>
        <div class="date-pills-row" id="date-pills-row"></div>
      </div>
      <div class="roll-info-bar" id="roll-info-bar"></div>
      <div class="already-saved-bar" id="roll-already-saved" style="display:none">⚠ 此日期已有記錄，儲存將會覆蓋</div>
      <div class="student-list" id="student-list"></div>
      <div class="save-bar">
        <div class="save-count" id="save-count"></div>
        <button class="btn-save" onclick="saveRoll()">儲存點名</button>
      </div>
    </div>

    <!-- MAKEUP -->
    <div class="screen" id="screen-makeup">
      <div class="makeup-section" style="padding-bottom:6px">
        <div style="font-size:14px;font-weight:800;margin:2px 4px 8px">📅 當日補堂點名</div>
        <div style="display:flex;gap:8px;margin:0 4px 8px">
          <input type="date" id="mkroll-date" onchange="loadMakeupRoll()" style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--fg);font-family:inherit;font-size:15px;padding:11px 12px;outline:none">
        </div>
        <input id="mkroll-q" placeholder="🔍 搜尋學生姓名" oninput="filterMakeupRoll()"
          style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--fg);font-family:inherit;font-size:15px;padding:11px 14px;outline:none;margin:0 0 8px">
        <div id="mkroll-list"></div>
      </div>
      <div class="makeup-filter-bar" id="makeup-filters"></div>
      <div class="makeup-section">
        <div id="makeup-class-filter-wrap" style="display:none"></div>
        <div id="makeup-list"></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="screen" id="screen-history">
      <div class="makeup-section">
        <div style="padding:4px 4px 12px">
          <input id="hist-stu-q" placeholder="🔍 輸入學生姓名查個人記錄（已出席／可補／過期）"
            oninput="searchStudentHistory()"
            style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--fg);font-family:inherit;font-size:15px;padding:12px 14px;outline:none">
        </div>
        <div id="hist-stu-summary"></div>
        <div id="history-list"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="screen" id="screen-settings">
      <div id="settings-content" style="padding:0 12px 100px"></div>
    </div>

    <div class="screen" id="screen-fees">
      <div id="fees-content" style="padding:0 12px 100px"></div>
    </div>

    <!-- 私人訓練（與恆常班分開；只記上課日）-->

      <div id="pt-content" style="padding:0 12px 100px"></div>

async function loadFromSheets(){
  setSyncIndicator('loading');
  try{
    const data = await apiPost({ action:'load' });   // 改用 POST：教練密碼隨 body 送出，不出現在網址；後端要密碼先回
    if (data.error || data.err) throw new Error(data.error || data.err);

    function ensureDateStr(val){
      if (!val) return null;
      const s = String(val).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
      const d = new Date(s);
      if (isNaN(d.getTime())) return s;
      return dateToStr(d);
    }

    restoreSettings(data.settings || []);

    (data.attendance || []).forEach(row => {
      const key = row.key;
      if (!ATT_LOG[key]) ATT_LOG[key] = {};
      ATT_LOG[key][row.name] = row.status;
    });

    if (data.absences && data.absences.length) {
      ABSENCES.length = 0;
      data.absences.forEach(row => {
        ABSENCES.push({
          id:row.id, name:row.name, classId:row.classId,
          absDate:ensureDateStr(row.absDate),
          deadline:ensureDateStr(row.deadline),
          madeUpDate:ensureDateStr(row.madeUpDate),
        });
      });
    }

    MEDNOTES = Array.isArray(data.medNotes) ? data.medNotes.map(m=>({
      name:String(m.name||''), classId:String(m.classId||''),
      date:ensureDateStr(m.date), link:String(m.link||'')
    })).filter(m=>m.name&&m.link) : [];

    CLOUD_LOADED = true;
    setSyncIndicator('ok');
    renderHome();

}
let CLOUD_LOADED = false;

function restoreSettings(rows){
  if (!rows || !rows.length) return;
  const map = {};
  rows.forEach(r => {
    if (!r.key || r.value === null || r.value === undefined) return;
    try { map[r.key] = JSON.parse(r.value); } catch(e) { map[r.key] = r.value; }
  });
  Object.keys(CLASSES).forEach(cid => {
    if (map[`class_${cid}_students`]) CLASSES[cid].students = map[`class_${cid}_students`];
    if (map[`class_${cid}_dayZh`])   CLASSES[cid].dayZh    = map[`class_${cid}_dayZh`];
    if (map[`class_${cid}_day`])      CLASSES[cid].day      = map[`class_${cid}_day`];
    if (map[`class_${cid}_time`])     CLASSES[cid].time     = map[`class_${cid}_time`];
    if (map[`class_${cid}_dow`] !== undefined) CLASS_DOW[cid] = map[`class_${cid}_dow`];
  });
  Object.keys(CLASSES).forEach(cid => {
    if (map[`extra_${cid}`])     CLASS_EXTRA_DATES[cid]     = new Set(map[`extra_${cid}`]);
    if (map[`cancelled_${cid}`]) CLASS_CANCELLED_DATES[cid] = new Set(map[`cancelled_${cid}`]);
  });
  if (map['public_holidays']) {
    PUBLIC_HOLIDAYS.clear();
    map['public_holidays'].forEach(d => PUBLIC_HOLIDAYS.add(d));
  }
}

function buildSettingsPayload(){
  const payload = {};
  Object.entries(CLASSES).forEach(([cid, cls]) => {
    payload[`class_${cid}_students`] = cls.students;
    payload[`class_${cid}_dayZh`]   = cls.dayZh;
    payload[`class_${cid}_day`]      = cls.day;
    payload[`class_${cid}_time`]     = cls.time;
    payload[`class_${cid}_dow`]      = CLASS_DOW[cid];
  });
  Object.keys(CLASSES).forEach(cid => {
    payload[`extra_${cid}`]     = [...(CLASS_EXTRA_DATES[cid]     || new Set())];
    payload[`cancelled_${cid}`] = [...(CLASS_CANCELLED_DATES[cid] || new Set())];
  });
  payload['public_holidays'] = [...PUBLIC_HOLIDAYS];
  return payload;
}

/* ═══════════ 五、工具函數 ═══════════ */
function genId(){ return 'r' + Date.now() + Math.random().toString(36).slice(2,5); }
function dateToStr(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayStr(){ return new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Hong_Kong',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date()); }
function hkDow(){ const wd=new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Hong_Kong',weekday:'short'}).format(new Date()); return {Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6}[wd]; }
/* 雙月分期工具（與家長頁一致）：0=1-2月,1=3-4月,... */
function biMonthOf(isoStr){ return Math.floor((Number(isoStr.split('-')[1])-1)/2); }
function periodLabel(idx){ return `${idx*2+1}-${idx*2+2}月`; }
function termPeriods(){ const a=biMonthOf(CONFIG.TERM_START),b=biMonthOf(CONFIG.TERM_END);const out=[];for(let i=a;i<=b;i++)out.push(i);return out; }
function currentPeriodIdx(){ const ps=termPeriods();return Math.min(Math.max(biMonthOf(todayStr()),ps[0]),ps[ps.length-1]); }
let histPeriod = null;
function setHistPeriod(idx){ histPeriod=idx; renderHistory(); }
function fmtDate(str){ if(!str) return '—'; const [y,m,d]=str.split('-'); return `${parseInt(d)}/${parseInt(m)}/${y}`; }
function fmtShort(str){ if(!str) return '—'; const [,m,d]=str.split('-'); return `${parseInt(m)}/${parseInt(d)}`; }
function addMonths(str, n){
  const [y,m,day] = str.split('-').map(Number);
  const d = new Date(y, m-1, day);
  d.setMonth(d.getMonth()+n);
  return dateToStr(d);
}
function daysLeft(deadline){
  if(!deadline) return NaN;
  const t = new Date(todayStr()+'T00:00:00');
  const d = new Date(deadline+'T00:00:00');
  return Math.round((d - t)/86400000);
}
function isExpired(deadline){ if(!deadline) return false; return deadline < todayStr(); }
function getPending(name){ return ABSENCES.filter(a => a.name===name && !a.madeUpDate); }
function getPendingActive(name){ const now=todayStr(); return ABSENCES.filter(a => a.name===name && !a.madeUpDate && a.deadline>=now); }
function totalPendingAll(){ const now=todayStr(); return ABSENCES.filter(a => !a.madeUpDate && a.deadline>=now).length; }
function totalExpiredAll(){ const now=todayStr(); return ABSENCES.filter(a => !a.madeUpDate && a.deadline<now).length; }

function toast(msg, emoji='✓'){
  const el = document.getElementById('toast');
  el.textContent = emoji + ' ' + msg;
  el.classList.add('show');
  clearTimeout(el._t);

}
function setSyncIndicator(status){
  syncStatus = status;
  const el = document.getElementById('sync-indicator');
  if (!el) return;
  el.onclick = () => { if (syncStatus==='error') loadFromSheets(); };
  const icons = { loading:'⏳', saving:'💾', ok:'☁', error:'❌', idle:'☁' };
  el.textContent = icons[status] || '☁';
}

function getClassDatesInMonth(classId, year, month){
  const dow = CLASS_DOW[classId];
  const cancelled = CLASS_CANCELLED_DATES[classId] || new Set();
  const extra     = CLASS_EXTRA_DATES[classId]     || new Set();
  const dates = [];
  const d = new Date(year, month, 1);
  while (d.getDay() !== dow) d.setDate(d.getDate()+1);
  while (d.getMonth() === month) {
    const str = dateToStr(d);
    if (!PUBLIC_HOLIDAYS.has(str) && !cancelled.has(str)) dates.push(str);
    d.setDate(d.getDate()+7);
  }
  extra.forEach(str => {
    if (!dates.includes(str) && !cancelled.has(str)) {
      const [y,m] = str.split('-').map(Number);
      if (y===year && m-1===month) dates.push(str);
    }
  });
  return dates.sort();
}
function pickDefaultDate(classId, vm){
  const dates = getClassDatesInMonth(classId, vm.year, vm.month);
  if (!dates.length) return null;
  const today = todayStr();
  if (dates.includes(today)) return today;
  const past = dates.filter(d => d <= today);
  if (past.length) return past[past.length-1];
  return dates[0];
}

async function ptMark(name, i){

/* ═══════════ 八、點名 ═══════════ */
function openRoll(classId){
  currentClass = classId;
  rollSession  = {};

  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth();
  if (y < MIN_YEAR || (y === MIN_YEAR && m < MIN_MONTH)) { y = MIN_YEAR; m = MIN_MONTH; }
  rollViewMonth = { year:y, month:m };

  rollSelectedDate = pickDefaultDate(classId, rollViewMonth);
  showScreen('roll');

  const cls = CLASSES[classId];
  document.getElementById('header-title-text').textContent = cls.dayZh + ' ' + cls.time;
  document.getElementById('header-subtitle-text').textContent = cls.students.length + ' 位學生';

  renderDatePills();
  loadRollSession();
}
function getRollStudents(classId, dateStr){
  const base = CLASSES[classId] ? CLASSES[classId].students.slice() : [];
  // 加入當日補堂學生：家長申請補堂後，後端已喺目標班嗰格寫低（喺 ATT_LOG 出現但唔屬正規名單）→ 點名名單見到佢
  const sess = (dateStr && ATT_LOG[classId + '|' + dateStr]) || {};
  Object.keys(sess).forEach(n => { if (n && base.indexOf(n) < 0) base.push(n); });
  return base;
}
function isMakeupVisitor(classId, name){
  return !!(CLASSES[classId] && CLASSES[classId].students.indexOf(name) < 0);
}
function changeMonth(delta){
  let { year, month } = rollViewMonth;
  month += delta;
  if (month < 0)  { month = 11; year--; }
  if (month > 11) { month = 0;  year++; }
  if (year < MIN_YEAR || (year === MIN_YEAR && month < MIN_MONTH)) { year = MIN_YEAR; month = MIN_MONTH; }
  rollViewMonth = { year, month };
  const def = pickDefaultDate(currentClass, rollViewMonth);
  if (def) rollSelectedDate = def;
  renderDatePills();
  loadRollSession();
}
function selectDate(dateStr){
  rollSelectedDate = dateStr;
  renderDatePills();
  loadRollSession();
}
function renderDatePills(){
  const { year, month } = rollViewMonth;
  const today = todayStr();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('month-nav-label').textContent = `${year}年 ${monthNames[month]}`;

  const atMin = (year === MIN_YEAR && month === MIN_MONTH);
  const backBtn = document.querySelector('.month-nav-btn:first-child');
  if (backBtn) { backBtn.style.opacity = atMin ? '0.3' : '1'; backBtn.style.pointerEvents = atMin ? 'none' : 'auto'; }

  const dates = getClassDatesInMonth(currentClass, year, month);
  const dayLabels = ['日','一','二','三','四','五','六'];
  const row = document.getElementById('date-pills-row');

  if (!dates.length) { row.innerHTML = `<div style="padding:6px 4px;color:var(--muted);font-size:13px">本月沒有上課日</div>`; return; }

  row.innerHTML = dates.map(dateStr => {
    const d = new Date(dateStr + 'T00:00:00');
    const dayNum = d.getDate();
    const dayName = dayLabels[d.getDay()];
    const key = currentClass + '|' + dateStr;
    const hasSaved = ATT_LOG[key] && Object.keys(ATT_LOG[key]).length > 0;
    const isFuture = dateStr > today;
    const isToday  = dateStr === today;
    const isSel    = dateStr === rollSelectedDate;
    let cls = 'date-pill';
    if (isSel) cls += ' selected'; else if (isToday) cls += ' today';
    if (hasSaved) cls += ' saved';
    if (isFuture) cls += ' future';
    return `<div class="${cls}" onclick="selectDate('${dateStr}')"><span class="dp-day">${dayName}</span><span class="dp-date">${dayNum}</span></div>`;
  }).join('');

  setTimeout(() => {
    const pills = row.querySelectorAll('.date-pill');
    const selIdx = dates.indexOf(rollSelectedDate);
    if (selIdx >= 0 && pills[selIdx]) pills[selIdx].scrollIntoView({ inline:'center', behavior:'smooth', block:'nearest' });
  }, 50);
}
function loadRollSession(){
  if (!rollSelectedDate || !currentClass) {
    document.getElementById('student-list').innerHTML = '';
    document.getElementById('roll-info-bar').textContent = '請選擇日期';
    document.getElementById('roll-already-saved').style.display = 'none';
    updateSaveCount();
    return;
  }
  const key = currentClass + '|' + rollSelectedDate;
  const saved = ATT_LOG[key];
  if (saved && Object.keys(saved).length > 0) {
    rollSession = { ...saved };
    document.getElementById('roll-already-saved').style.display = 'flex';
  } else {
    rollSession = {};
    getRollStudents(currentClass, rollSelectedDate).forEach(n => rollSession[n] = 'present');
    document.getElementById('roll-already-saved').style.display = 'none';
  }
  const d = new Date(rollSelectedDate + 'T00:00:00');
  document.getElementById('roll-info-bar').textContent = `📅 ${d.getMonth()+1}月${d.getDate()}日 · 預設全部出席，只需標記請假或補堂`;
  renderRollTable();
}
function renderRollTable(){
  const list = document.getElementById('student-list');
  const students = getRollStudents(currentClass, rollSelectedDate);
  list.innerHTML = students.map(name => {
    const st = rollSession[name] || 'present';
    const pendingActive = getPendingActive(name);
    const pendingAll    = getPending(name);
    const expired       = pendingAll.filter(a => isExpired(a.deadline));
    let subText = '', subCls = '';
    if (pendingActive.length > 0) {
      const earliest = pendingActive.slice().sort((a,b)=>a.deadline.localeCompare(b.deadline))[0];
      const dl = earliest.deadline ? daysLeft(earliest.deadline) : null;
      subCls = (dl !== null && !isNaN(dl) && dl <= 14) ? 'danger' : 'warn';
      subText = `欠 ${pendingActive.length} 節 · 最早 ${fmtShort(earliest.deadline)} 到期`;
    } else if (expired.length > 0) {
      subCls = 'danger';
      subText = `${expired.length} 節已過期`;
    }
    let makeupHint = '';
    if (st === 'makeup' && pendingAll.length > 0) {
      const oldest = pendingAll.slice().sort((a,b)=>a.absDate.localeCompare(b.absDate))[0];
      makeupHint = `<div style="font-size:11px;color:var(--purple);margin-top:4px">補 ${fmtShort(oldest.absDate)} 的堂</div>`;
    }
    const cardCls = st==='absent'?'is-absent':st==='makeup'?'is-makeup':st==='exempt'?'is-exempt':st==='present'?'is-present':'';
    return `
    <div class="student-card ${cardCls}" id="sc-${name}">
      <div class="student-name-wrap">
        <div class="student-name">${name}${isMakeupVisitor(currentClass,name)?` <span style="font-size:11px;font-weight:700;color:var(--purple);background:var(--purple-dim);border-radius:6px;padding:1px 7px;margin-left:4px">↩ 補堂</span>`:''}</div>
        ${subText ? `<div class="student-sub ${subCls}">${subText}</div>` : ''}
        ${makeupHint}
      </div>
      <div class="student-btns">
        <button class="s-btn ${st==='present'?'sel-present':''}" onclick="setRoll('${name}','present')" title="出席">✓</button>
        <button class="s-btn ${st==='absent' ?'sel-absent' :''}" onclick="setRoll('${name}','absent')"  title="請假">✗</button>
        <button class="s-btn ${st==='makeup' ?'sel-makeup' :''}" onclick="setRoll('${name}','makeup')"  title="補堂">↩</button>
        <button class="s-btn ${st==='exempt' ?'sel-exempt' :''}" onclick="setRoll('${name}','exempt')"  title="豁免">🚫</button>
      </div>
    </div>`;
  }).join('');
  updateSaveCount();
}
function setRoll(name, status){
  rollSession[name] = status;
  const card = document.getElementById('sc-' + name);
  card.className = 'student-card ' + (status==='absent'?'is-absent':status==='makeup'?'is-makeup':status==='exempt'?'is-exempt':'is-present');
  const btns = card.querySelectorAll('.s-btn');
  btns[0].className = 's-btn' + (status==='present'?' sel-present':'');
  btns[1].className = 's-btn' + (status==='absent' ?' sel-absent':'');
  btns[2].className = 's-btn' + (status==='makeup' ?' sel-makeup':'');
  if (btns[3]) btns[3].className = 's-btn' + (status==='exempt' ?' sel-exempt':'');
  const nameWrap = card.querySelector('.student-name-wrap');
  const existing = nameWrap.querySelector('[style*="purple"]');
  if (existing) existing.remove();
  if (status === 'makeup') {
    const pending = getPending(name);
    if (pending.length > 0) {
      const oldest = pending.slice().sort((a,b)=>a.absDate.localeCompare(b.absDate))[0];
      const hint = document.createElement('div');
      hint.style.cssText = 'font-size:11px;color:var(--purple);margin-top:4px';
      hint.textContent = '補 ' + fmtShort(oldest.absDate) + ' 的堂';
      nameWrap.appendChild(hint);
    }
  }
  updateSaveCount();
}
function updateSaveCount(){
  const el = document.getElementById('save-count');
  if (!el) return;
  if (!currentClass || !rollSelectedDate) { el.textContent = ''; return; }
  const students = getRollStudents(currentClass, rollSelectedDate);
  let absent=0, makeup=0, exempt=0;
  students.forEach(n => {
    const s = rollSession[n] || 'present';
    if (s==='absent') absent++; else if (s==='makeup') makeup++; else if (s==='exempt') exempt++;
  });
  const present = students.length - absent - makeup - exempt;
  el.innerHTML = `出席 ${present} · 請假 <span>${absent}</span> · 補堂 ${makeup}${exempt?` · 豁免 ${exempt}`:''}`;
}
function saveRoll(){
  const date = rollSelectedDate;
  if (!date) { toast('請先選擇日期', '⚠'); return; }
  const key = currentClass + '|' + date;
  ATT_LOG[key] = { ...rollSession };
  CLASSES[currentClass].students.forEach(name => {
    const st = rollSession[name] || 'present';
    if (st === 'absent') {
      const dup = ABSENCES.find(a => a.name===name && a.classId===currentClass && a.absDate===date);
      if (!dup) ABSENCES.push({ id:genId(), name, classId:currentClass, absDate:date, deadline:addMonths(date,2), madeUpDate:null });
    }
    if (st === 'makeup') {
      const pending = getPending(name).slice().sort((a,b)=>a.absDate.localeCompare(b.absDate));
      if (pending.length > 0) pending[0].madeUpDate = date;
    }
  });
  document.getElementById('roll-already-saved').style.display = 'flex';
  renderDatePills();
  toast('點名記錄已儲存', '✓');
}

async function markMakeupRoll(name,key,date,status,btn){

function renderMakeup(){
  document.getElementById('header-title-text').textContent = '補堂記錄';
  document.getElementById('header-subtitle-text').textContent = '所有班別';
  const mkd=document.getElementById('mkroll-date');
  if(mkd){ if(!mkd.value) mkd.value=todayStr(); loadMakeupRoll(); }

  const filters = [
    { key:'pending', label:'待補堂' },
    { key:'urgent',  label:'即將到期' },
    { key:'expired', label:'已過期' },
    { key:'done',    label:'已完成' },
    { key:'all',     label:'全部' },
    { key:'byclass', label:'📋 按班別' },
  ];
  document.getElementById('makeup-filters').innerHTML = filters.map(f =>
    `<div class="filter-pill ${makeupFilter===f.key?'active':''}" onclick="setMakeupFilter('${f.key}')">${f.label}</div>`
  ).join('');

  const wrap = document.getElementById('makeup-class-filter-wrap');
  if (makeupFilter === 'byclass') {
    wrap.style.display = 'block';
    renderMakeupByClass();
    document.getElementById('makeup-list').style.display = 'none';
    return;
  } else {
    wrap.style.display = 'none';
    document.getElementById('makeup-list').style.display = 'block';
  }

  const now = todayStr();
  let rows = [];
  if (makeupFilter === 'pending') {
    rows = ABSENCES.filter(a => !a.madeUpDate && a.deadline >= now).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  } else if (makeupFilter === 'urgent') {
    rows = ABSENCES.filter(a => !a.madeUpDate && a.deadline >= now && daysLeft(a.deadline) <= 14).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  } else if (makeupFilter === 'expired') {
    rows = ABSENCES.filter(a => !a.madeUpDate && a.deadline < now).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  } else if (makeupFilter === 'done') {
    rows = ABSENCES.filter(a => a.madeUpDate).sort((a,b)=>b.madeUpDate.localeCompare(a.madeUpDate));
  } else {
    rows = [...ABSENCES].sort((a,b)=>a.deadline.localeCompare(b.deadline));
  }

  const list = document.getElementById('makeup-list');
  list.innerHTML = rows.length ? rows.map(makeupCardHTML).join('')
    : `<div class="empty-state"><div class="icon">✓</div><p>沒有符合條件的記錄</p></div>`;
}
function makeupCardHTML(a){
  const done = !!a.madeUpDate;
  const exp  = !done && !!a.deadline && isExpired(a.deadline);
  const dl   = a.deadline ? daysLeft(a.deadline) : null;
  const urg  = !done && !exp && dl !== null && !isNaN(dl) && dl <= 14;
  const cls  = CLASSES[a.classId];
  let deadlinePill, cardCls = '';
  if (done)            { deadlinePill = `<span class="makeup-deadline done">✓ 已補堂 ${fmtShort(a.madeUpDate)}</span>`; cardCls='done'; }
  else if (!a.deadline){ deadlinePill = `<span class="makeup-deadline overdue">未設期限</span>`; cardCls='overdue'; }
  else if (exp)        { deadlinePill = `<span class="makeup-deadline overdue">已過期</span>`; cardCls='overdue'; }
  else if (urg)        { deadlinePill = `<span class="makeup-deadline urgent">⚠ 剩 ${dl} 天</span>`; cardCls='urgent'; }
  else                 { deadlinePill = `<span class="makeup-deadline ok">還有 ${dl} 天</span>`; }
  const actionBtn = !done ? `<button class="btn-makeup-done" onclick="markMakeupDone('${a.id}')">已補堂</button>` : '';
  return `
  <div class="makeup-card ${cardCls}">
    <div class="makeup-card-left">
      <div class="makeup-name">${a.name}</div>
      <div class="makeup-meta">${fmtDate(a.absDate)} 請假 · ${cls?cls.dayZh:''} ${cls?cls.time:''}</div>
      <div class="makeup-meta">補堂期限：${fmtDate(a.deadline)}</div>
      ${deadlinePill}
    </div>
    <div class="makeup-card-action">${actionBtn}</div>
  </div>`;
}
function renderMakeupByClass(){
  const wrap = document.getElementById('makeup-class-filter-wrap');
  const blocks = Object.entries(CLASSES).map(([cid, cls]) => {
    const pend = ABSENCES.filter(a => a.classId===cid && !a.madeUpDate).sort((a,b)=>a.deadline.localeCompare(b.deadline));
    if (!pend.length) return '';
    return `
      <div class="mk-class-title"><span class="sch-pill">${cls.dayZh}</span> ${cls.time} <span class="cnt">· 待補 ${pend.length} 節</span></div>

function markMakeupDone(id){
  const rec = ABSENCES.find(a => a.id === id);

/* 逐個學生概覽：已出席 / 可補堂(未過期) / 已過補堂期限 */
// 計一個學生嘅完整歷史資料（出席/可補/過期/已補）
function studentHistData(name){
  const now = todayStr();
  let attended = [];
  Object.entries(ATT_LOG).forEach(([key, sess]) => {
    const st = sess[name];
    if (st==='present' || st==='makeup') { const [cid,date]=key.split('|'); attended.push({date,cid,makeup:st==='makeup'}); }
  });
  attended.sort((a,b)=>a.date.localeCompare(b.date));
  const mkable  = ABSENCES.filter(a=>a.name===name && !a.madeUpDate && a.deadline && a.deadline>=now).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  const expired = ABSENCES.filter(a=>a.name===name && !a.madeUpDate && a.deadline && a.deadline<now).sort((a,b)=>a.deadline.localeCompare(b.deadline));
  const done    = ABSENCES.filter(a=>a.name===name && a.madeUpDate).length;
  return { attended, mkable, expired, done };
}
// 一張可展開嘅學生歷史卡（撳標題展開／收起）
function studentHistCard(name, openByDefault){
  const { attended, mkable, expired, done } = studentHistData(name);

  const lbl = cid => { const c=CLASSES[cid]; return c?`${c.dayZh} ${c.time}`:cid; };
  if (!attended.length && !mkable.length && !expired.length && !done) {
    return `<div class="history-session"><div class="history-session-header"><div><h3>${name}</h3><p style="color:var(--muted)">暫無記錄</p></div></div></div>`;

    ${expired.length?`<div style="font-size:13px;font-weight:700;color:#f87171;margin:8px 14px 2px">🔴 已過補堂期限（不能補堂）</div>${expired.map(a=>row(`${lbl(a.classId)}・${fmtDate(a.absDate)} 請假`,`限期 ${fmtDate(a.deadline)} 已過`,'#f87171')).join('')}`:''}
    ${done?`<div style="font-size:12px;color:var(--muted);margin:8px 14px 2px">✓ 已完成補堂 ${done} 節</div>`:''}
    ${attended.length?`<div style="font-size:13px;font-weight:700;color:var(--green,#34d399);margin:8px 14px 2px">✅ 已出席課堂（${attended.length}）</div>${attended.map(a=>{const d=new Date(a.date+'T00:00:00');return row(`${fmtDate(a.date)}（星期${['日','一','二','三','四','五','六'][d.getDay()]}）`,lbl(a.cid)+(a.makeup?'（補堂）':''),'var(--green,#34d399)');}).join('')}`:''}`;

  toast(`已移除加課日 ${fmtDate(d)}`, '✓');

/* ═══════════ 十二、數據驗證 ═══════════ */
function silentValidate(){
  let changed = false;
  ABSENCES.forEach(a => { if (!a.deadline && a.absDate) { a.deadline = addMonths(a.absDate, 2); changed = true; } });
  if (changed) syncAbsences();
}
function validateAndFixData(){
  let fixed = 0;
  Object.entries(ATT_LOG).forEach(([key, sess]) => {
    const [cid, date] = key.split('|');
    Object.entries(sess).forEach(([name, st]) => {
      if (st === 'absent') {
        const dup = ABSENCES.find(a => a.name===name && a.classId===cid && a.absDate===date);
        if (!dup) { ABSENCES.push({ id:genId(), name, classId:cid, absDate:date, deadline:addMonths(date,2), madeUpDate:null }); fixed++; }
      }
    });
  });
  ABSENCES.forEach(a => { if (!a.deadline && a.absDate) { a.deadline = addMonths(a.absDate, 2); fixed++; } });
  if (fixed) { syncAbsences(); if (currentScreen==='makeup') renderMakeup(); }
  toast(fixed ? `已修正 ${fixed} 項缺失記錄` : '數據正常，無需修正', '🔍');
}

/* ═══════════ 十三、每日 Sheet 點名（A 整合：dailyList / markAttendance / cancelDay）═══════════ */
let coachDate = null;

function renderToday(){
  document.getElementById('header-title-text').textContent = '每日點名';
  document.getElementById('header-subtitle-text').textContent = '直接寫入 Google Sheet · 即時同步';
  if (!coachDate) coachDate = todayStr();
  const inp = document.getElementById('today-date');

function coachToday(){
  coachDate = todayStr();
  const inp = document.getElementById('today-date');
  if (inp) inp.value = coachDate;
  loadDaily();
}
async function loadDaily(){
  const inp = document.getElementById('today-date');
  coachDate = inp ? inp.value : todayStr();
  const box = document.getElementById('daily-list');
  box.innerHTML = `<div class="empty-state"><div class="icon">⏳</div><p>載入中…</p></div>`;
  let r;
  try { r = await apiPost({ action:'dailyList', date:coachDate, coachPass:cpass() }); }
  catch(e){ box.innerHTML = `<div class="empty-state"><div class="icon">⚠</div><p>連線錯誤，請再試<br><span style="font-size:12px">（確認已部署統一後端並填好 API_URL）</span></p></div>`; return; }
  if (!r || !r.ok) { box.innerHTML = `<div class="empty-state"><div class="icon">🔒</div><p>${(r&&r.err)||'載入失敗'}</p></div>`; return; }
  if (!r.list || !r.list.length) {
    const d = new Date(coachDate + 'T00:00:00');
    box.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${d.getMonth()+1}月${d.getDate()}日（星期${'日一二三四五六'[d.getDay()]}）<br>當日冇班別上課</p></div>`;
    return;
  }
  box.innerHTML = r.list.map((g, gi) => {
    const key = g.c.key || g.c.sport;
    const label = (g.c.dayZh || g.c.wd || '') + ' ' + (g.c.time || '');
    const present = g.rows.filter(x => x.status === '出席' || x.status === '補堂').length;
    const miss = g.rows.filter(x => !x.status || x.status === '補堂').length;
    return `<div class="cgrp" id="cg${gi}">
      <div class="grp-h"><span class="dot"></span>${label}<span class="t">${g.rows.length} 人</span></div>
      <div class="ccount" id="cc${gi}">出席 <b>${present}</b> / ${g.rows.length}${miss?`　·　<span class="miss">未點 ${miss}</span>`:''}</div>
      <div class="allrow">
        <button class="allbtn" onclick="markAllDaily(${gi},'${key}','${coachDate}','出席',this)">✓ 全部出席</button>
        <button class="allbtn bad" onclick="markAllDaily(${gi},'${key}','${coachDate}','缺席',this)">✗ 全部缺席</button>
      </div>
      ${g.rows.map(row => attRowHTML(g, row, key)).join('')}
    </div>`;
  }).join('');
}
function attRowHTML(g, row, key){
  const mk = row.makeup ? 1 : 0;
  const go = row.status === '出席', no = row.status === '缺席';
  const cc = row.status === '停課', lv = row.status === '請假';
  const tag = row.makeup ? '<span class="tag">補堂</span>'
    : cc ? '<span class="tag" style="background:rgba(255,255,255,0.1);color:var(--muted)">停課</span>'
    : lv ? '<span class="tag" style="background:var(--amber-dim);color:var(--amber)">請假</span>' : '';
  return `<div class="att" data-mk="${mk}" data-name="${row.name}">
    <span class="nm">${row.name}</span>${tag}
    <div class="marks">
      <button class="mk go ${go?'on':''}" onclick="markDaily('${row.name}','${key}','${coachDate}','出席',this,${mk})">出</button>
      <button class="mk no ${no?'on':''}" onclick="markDaily('${row.name}','${key}','${coachDate}','缺席',this,${mk})">缺</button>
    </div></div>`;
}
function recountDaily(gi){
  const grp = document.getElementById('cg' + gi); if (!grp) return;
  const atts = [...grp.querySelectorAll('.att')];
  const present = atts.filter(a => a.querySelector('.mk.go.on')).length;
  const miss = atts.filter(a => !a.querySelector('.mk.on')).length;
  const cc = document.getElementById('cc' + gi);
  if (cc) cc.innerHTML = `出席 <b>${present}</b> / ${atts.length}${miss?`　·　<span class="miss">未點 ${miss}</span>`:''}`;
}
async function markDaily(name, key, date, status, btn, mk){
  const wrap = btn.closest('.att');
  const gi = wrap.closest('.cgrp').id.replace('cg','');
  let r;
  try { r = await apiPost({ action:'markAttendance', name, key, date, status, makeup:!!mk }); }
  catch(e){ toast('連線錯誤，請再試', '⚠'); return; }
  if (!r || !r.ok) { toast('儲存失敗' + (r&&r.err?'：'+r.err:''), '⚠'); return; }
  wrap.querySelectorAll('.mk').forEach(m => m.classList.remove('on'));
  btn.classList.add('on');
  recountDaily(gi);
  toast(`${name}：${status}`, '✓');
}
async function markAllDaily(gi, key, date, status, btn){
  const grp = document.getElementById('cg' + gi);
  const rows = [...grp.querySelectorAll('.att')];
  const old = btn.textContent; btn.textContent = '儲存中…'; btn.disabled = true;
  let okn = 0;
  for (const row of rows){
    const name = row.dataset.name;
    const mk = row.dataset.mk === '1';
    try {
      const r = await apiPost({ action:'markAttendance', name, key, date, status, makeup:mk });
      if (r && r.ok){
        row.querySelectorAll('.mk').forEach(m => m.classList.remove('on'));
        const sel = row.querySelector(status === '出席' ? '.mk.go' : '.mk.no');
        if (sel) sel.classList.add('on');
        okn++;
      }
    } catch(e){}
  }
  btn.textContent = old; btn.disabled = false;
  recountDaily(gi);
  toast(`${status}：已存 ${okn} 人`, '✓');
}

async function doWeatherCancel(date){
  toast('處理中…', '🌧');
  let r;

  catch(e){ toast('連線錯誤，請再試', '⚠'); return; }

/* ── 停課（不收費）：學費自動少計一堂，已繳家長自動順延下期折扣 ── */
async function freeCancel(){
  const date = document.getElementById('today-date').value;
  const d = new Date(date + 'T00:00:00');
  const wd = '日一二三四五六'[d.getDay()];
  if (!confirm(`確定將 ${d.getMonth()+1}/${d.getDate()}（星期${wd}）所有課堂標記為「停課・不收費」？\n\n• 該堂會從學費中扣減（少計一堂）\n• 已繳費家長自動順延做下一期折扣\n• 此堂不設補堂`)) return;
  toast('處理中…', '🚫');
  let r;
  try { r = await apiPost({ action:'cancelDayFree', date, coachPass:cpass() }); }
  catch(e){ toast('連線錯誤，請再試', '⚠'); return; }
  if (!r || !r.ok) { toast('失敗' + (r&&r.err?'：'+r.err:''), '⚠'); return; }
  await loadDaily();
  toast(`已停課(不收費) ${r.classes?r.classes.length:0} 班・順延折扣 ${r.credited||0} 位`, '✓');
}
function showCancelPanel(date){
  const box = document.getElementById('daily-list'); if (!box) return;
  const p = document.createElement('div');
  p.className = 'cancelpanel';
  p.innerHTML = `<div class="cp-h">📣 家長群組文案（當日全部已標「停課」）</div>
    <textarea id="cptext" readonly rows="7">${cancelText(date)}</textarea>
    <button class="btn-copy" onclick="copyCancel()">複製文案</button>`;
  box.prepend(p);
}
function copyCancel(){
  const t = document.getElementById('cptext'); if (!t) return;
  t.select(); t.setSelectionRange(0, 99999);
  const done = () => toast('已複製，可貼去 WhatsApp 群組', '✓');
  try { navigator.clipboard.writeText(t.value).then(done, () => { document.execCommand('copy'); done(); }); }
  catch(e){ try { document.execCommand('copy'); done(); } catch(_){ toast('請長按文字手動複製', 'ℹ'); } }
}

/* ── 健康檢查（ping）── */
async function checkHealth(){
  const el = document.getElementById('health-line'); if (!el) return;
  el.textContent = '● 檢查連線中…'; el.style.color = 'var(--muted)';
  let r;
  try { r = await apiPost({ action:'ping' }); }
  catch(e){ el.textContent = '● 連線失敗（檢查 API_URL / 部署）'; el.style.color = 'var(--red)'; return; }
  const ver = r && r.version;
  if (r && r.ok && ver === CONFIG.EXPECTED_VERSION) { el.textContent = '● 系統正常 · ' + ver; el.style.color = 'var(--green)'; }
  else if (r && r.ok) { el.textContent = '● 後端版本 ' + ver + '（期望 ' + CONFIG.EXPECTED_VERSION + '，請重新部署）'; el.style.color = 'var(--amber)'; }
  else { el.textContent = '● 連線失敗'; el.style.color = 'var(--red)'; }
}

/* ═══════════ 十五、初始化 ═══════════ */
function installManifest(){
  try{
    const icon=document.getElementById('apple-icon')?document.getElementById('apple-icon').href:'';
    const mf={name:'IS 出席補堂管理',short_name:'IS 點名',start_url:location.href,
      display:'standalone',background_color:'#111111',theme_color:'#111111',
      icons:icon?[{src:icon,sizes:'512x512',type:'image/png'}]:[]};
    const blob=new Blob([JSON.stringify(mf)],{type:'application/manifest+json'});
    const l=document.createElement('link'); l.rel='manifest'; l.href=URL.createObjectURL(blob);
    document.head.appendChild(l);
  }catch(e){}
}
let COACH_PASS_RT = (function(){ try{ return localStorage.getItem('is_cpass')||sessionStorage.getItem('is_cpass')||''; }catch(e){ return ''; } })();
function cpass(){ return COACH_PASS_RT; }
async function coachGateSubmit(){
  const v=document.getElementById('cg-pass').value.trim();
  if(!v){ document.getElementById('cg-err').textContent='請輸入密碼'; return; }
  const btn=document.getElementById('cg-go'); btn.disabled=true; btn.textContent='登入中…';
  let r; try{ r=await apiPost({action:'coachLogin', coachPass:v}); }catch(e){ r=null; }
  btn.disabled=false; btn.textContent='登入';
  if(!r||!r.ok){ document.getElementById('cg-err').textContent='密碼錯誤'; return; }
  COACH_PASS_RT=v; try{ localStorage.setItem('is_cpass',v); sessionStorage.removeItem('is_cpass'); }catch(e){}
  document.getElementById('cg-err').textContent='';
  document.getElementById('coach-gate').style.display='none';
  showScreen('home', false); await loadFromSheets(); checkHealth();
}
function coachLogout(){
  COACH_PASS_RT=''; try{ localStorage.removeItem('is_cpass'); sessionStorage.removeItem('is_cpass'); }catch(e){}
  const g=document.getElementById('coach-gate'); g.style.display='flex';
  document.getElementById('cg-pass').value='';
}
document.addEventListener('DOMContentLoaded', async function(){
  installManifest();
  if(COACH_PASS_RT){
    document.getElementById('coach-gate').style.display='none';
    showScreen('home', false); await loadFromSheets(); checkHealth();
  } else {
    document.getElementById('coach-gate').style.display='flex';
  }
});
</script>
