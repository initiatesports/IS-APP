name: Deploy Apps Script backends

# 只有後端程式碼(apps-script/**)有改動時才跑;改前端 HTML 由 GitHub Pages 自行處理,不會誤觸這裡。
on:
  push:
    branches: [main]
    paths:
      - "apps-script/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # 也可在 Actions 頁面手動觸發

concurrency:
  group: deploy-apps-script
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 取完整歷史,先可以同上一版比較邊個後端改咗

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install -g @google/clasp@3

      - name: Write clasp auth
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"

      # 只部署「有改動」的後端,並在撞 Google 部署配額時自動退避重試。
      # 每個後端都更新同一個 deployment id → /exec 網址永遠不變。
      - name: Deploy changed backends
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -uo pipefail

          # 後端目錄 → 生產 deployment id 對照
          declare -A IDS=(
            [unified-system]="AKfycbxeQizogWDoNl6PhAp_sE3_HfFc8MAtYEd-66k7zF3rRyhxPOM7qmnxYx6EzFUkiHLb"
            [booking]="AKfycbyQQoDyXnXB5vFNlUYUW-FU56zOkOhGgwIyRzGMNQ-IX0e5jigwFpqyJDsWNFx4hilj"
            [attendance-grid]="AKfycby9Ln3kZUubqRIuGdCF5cJ5tk4KuPITMQDuOFFuee1OwrId5gUa_sP_W5CuHga9y6i8"
            [parent-portal]="AKfycbxuJ6ypxGG3bZi5SGtgPkedl3fs0mm3SJ3c9DcauTN0SDzfTvSw7nyTBcaaI5vC9GU"
          )
          ALL="unified-system booking attendance-grid parent-portal"

          # 決定要部署邊啲後端
          changed=""
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ -z "${BEFORE_SHA:-}" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "手動觸發或無上一版可比較 → 部署全部後端"
            changed="$ALL"
          else
            # -c core.quotePath=false：避免中文檔名(程式碼.js)被加引號+八進制轉義,否則 ^apps-script/ 前綴比對會失敗
            files=$(git -c core.quotePath=false diff --name-only "$BEFORE_SHA" "$GITHUB_SHA" 2>/dev/null || git -c core.quotePath=false diff --name-only HEAD~1 HEAD)
            echo "本次改動檔案:"; echo "$files" | sed 's/^/  /'
            # workflow 檔本身改動 → 安全起見部署全部
            if echo "$files" | grep -q "^\.github/workflows/deploy\.yml$"; then
              echo "deploy.yml 有改動 → 部署全部後端"
              changed="$ALL"
            else
              for d in $ALL; do
                if echo "$files" | grep -q "^apps-script/$d/"; then changed="$changed $d"; fi
              done
            fi
          fi
          changed=$(echo $changed | xargs || true)

          if [ -z "$changed" ]; then echo "✓ 無後端改動,跳過部署"; exit 0; fi
          echo "▶ 將部署: $changed"

          # 單一後端部署 + 撞配額退避重試(20s→40s→60s)
          deploy_one() {
            local dir="$1" id="$2" attempt=1 max=4
            cd "$GITHUB_WORKSPACE/apps-script/$dir" || return 1
            clasp push -f || { echo "✗ $dir push 失敗"; return 1; }
            while true; do
              if clasp deploy -i "$id" -d "CI ${GITHUB_SHA::7}"; then
                echo "✓ $dir 部署成功"; return 0
              fi
              if [ "$attempt" -ge "$max" ]; then
                echo "✗ $dir 部署失敗(已重試 $max 次,可能持續撞配額)"; return 1
              fi
              local wait=$((attempt*20))
              echo "⚠ $dir 部署失敗,可能撞 Google 部署配額,等 ${wait}s 後重試 ($attempt/$max)..."
              sleep "$wait"; attempt=$((attempt+1))
            done
          }

          rc=0
          for d in $changed; do
            echo "──────── 部署 $d ────────"
            deploy_one "$d" "${IDS[$d]}" || rc=1
          done
          exit $rc
